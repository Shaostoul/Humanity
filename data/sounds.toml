# HumanityOS Sound Catalog
# Maps sound IDs to audio assets for the kira spatial audio system.
# Referenced by: creatures, spells, weather, structures, vehicles, UI
# All paths relative to assets/audio/. Format: .ogg (Vorbis).
# Hot-reloadable via FileWatcher.
#
# Bus types: "ambient", "music", "sfx", "voice", "ui"
# Spatial sounds use inverse-distance falloff between falloff_min and falloff_max.

# =============================================================================
