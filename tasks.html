<!DOCTYPE html>
<html lang=en>
<head>
  <meta charset=UTF-8>
  <meta name=viewport content=width=device-width,initial-scale=1.0>
  <title>Tasks — HumanityOS</title>
  <style>
    :root {
      --bg: #0a0a0a; --bg-card: #111; --bg-panel: #131313; --bg-input: #1a1a1a;
      --border: #1e1e1e; --border-bright: #2a2a2a;
      --text: #e0e0e0; --text-muted: #666; --text-dim: #444;
      --accent: #f0a500;
      --col-backlog: #333; --col-progress: #0a3a6e; --col-testing: #4a3500; --col-done: #0a3a1a;
      --col-backlog-h: #2a2a2a; --col-progress-h: #0d4d8a; --col-testing-h: #5a4200; --col-done-h: #0d4d22;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    #page-app { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Scope bar ── */
    .scope-bar {
      background: linear-gradient(180deg, #0e0e0e 0%, #0a0a0a 100%);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem 0;
      position: relative; overflow: hidden;
    }
    .scope-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.6rem; }
    .spiral-icon { width: 28px; height: 28px; flex-shrink: 0; }
    .scope-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; color: var(--text-muted); text-transform: uppercase; }
    .scope-tabs { display: flex; gap: 0.35rem; overflow-x: auto; scrollbar-width: none; padding-bottom: 0.6rem; }
    .scope-tabs::-webkit-scrollbar { display: none; }
    .scope-tab {
      display: flex; flex-direction: column; align-items: center;
      padding: 0.35rem 0.65rem; border-radius: 8px 8px 0 0; border: 1px solid transparent;
      border-bottom: none; cursor: pointer; white-space: nowrap; transition: all 0.15s;
      background: transparent; position: relative; flex-shrink: 0;
      color: var(--text); font-family: inherit;
    }
    .scope-tab:hover { background: #1a1a1a; }
    .scope-tab.active { background: var(--bg-panel); border-color: var(--border-bright); border-bottom-color: var(--bg-panel); }
    .scope-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px; background: var(--bg-panel); }
    .scope-fib { font-size: 0.6rem; font-weight: 800; letter-spacing: 0.05em; margin-bottom: 0.1rem; }
    .scope-label { font-size: 0.72rem; font-weight: 600; }
    .scope-tab-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 0.2rem; }

    /* ── Board controls ── */
    .board-controls {
      display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border); background: var(--bg-panel);
      flex-shrink: 0;
    }
    .scope-desc { flex: 1; font-size: 0.78rem; color: var(--text-muted); }
    .scope-desc strong { color: var(--text); }
    .stats { display: flex; gap: 0.75rem; font-size: 0.75rem; color: var(--text-muted); }
    .stat-pill { background: var(--bg-input); border-radius: 20px; padding: 0.2rem 0.6rem; }
    .stat-pill span { color: var(--text); font-weight: 700; }
    .btn-new {
      display: flex; align-items: center; gap: 0.4rem;
      background: var(--accent); color: #000; border: none;
      border-radius: 8px; padding: 0.45rem 0.9rem; font-size: 0.8rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s; flex-shrink: 0;
    }
    .btn-new:hover { opacity: 0.85; }
    .btn-refresh { background: transparent; border: 1px solid var(--border-bright); color: var(--text-muted); border-radius: 6px; padding: 0.4rem 0.6rem; font-size: 0.75rem; cursor: pointer; }
    .btn-refresh:hover { color: var(--text); border-color: #444; }

    /* ── Kanban ── */
    .kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; flex: 1; overflow: hidden; }
    .col { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
    .col:last-child { border-right: none; }
    .col-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 0.75rem; font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .col-count { background: var(--bg-input); border-radius: 10px; padding: 0.1rem 0.5rem; font-size: 0.68rem; font-weight: 800; color: var(--text-muted); }
    .col[data-status=backlog] .col-header  { color: #888; background: var(--col-backlog); }
    .col[data-status=in_progress] .col-header { color: #6ab0f5; background: var(--col-progress); }
    .col[data-status=testing] .col-header { color: #f0c040; background: var(--col-testing); }
    .col[data-status=done] .col-header { color: #4ec87a; background: var(--col-done); }
    .col-body { flex: 1; overflow-y: auto; padding: 0.4rem; display: flex; flex-direction: column; gap: 0.3rem; scrollbar-width: thin; scrollbar-color: #222 transparent; }

    /* ── Cards ── */
    .card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 7px;
      padding: 0.45rem 0.6rem; cursor: pointer; transition: border-color 0.15s, transform 0.1s;
      border-left: 3px solid var(--border);
    }
    .card:hover { border-color: #333; transform: translateY(-1px); }
    .card.priority-critical { border-left-color: #e53935; }
    .card.priority-high     { border-left-color: #f0a500; }
    .card.priority-medium   { border-left-color: #2196f3; }
    .card.priority-low      { border-left-color: #444; }
    .card-title { font-size: 0.8rem; font-weight: 600; line-height: 1.3; color: var(--text); }
    .card-info { display: flex; align-items: center; gap: 0.28rem; flex-wrap: wrap; margin-top: 0.22rem; font-size: 0.63rem; color: var(--text-dim); }
    .card-prio { font-weight: 700; font-size: 0.62rem; }
    .card-sep { color: #2a2a2a; font-size: 0.55rem; }
    .scope-badge { font-size: 0.65rem; font-weight: 700; padding: 0.1rem 0.4rem; border-radius: 4px; background: rgba(255,255,255,0.05); }
    .label-tag { font-size: 0.63rem; background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 4px; padding: 0.1rem 0.35rem; color: var(--text-muted); }
    .test-tally { margin-left: auto; font-size: 0.68rem; white-space: nowrap; }
    .empty-col { color: var(--text-dim); font-size: 0.75rem; text-align: center; padding: 1.5rem 0; }

    /* ── Modal ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #141414; border: 1px solid #2a2a2a; border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 1rem; font-weight: 700; color: var(--accent); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .form-group { margin-bottom: 0.9rem; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; background: var(--bg-input); border: 1px solid var(--border-bright);
      border-radius: 7px; padding: 0.5rem 0.7rem; color: var(--text); font-size: 0.83rem;
      font-family: inherit; outline: none; transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .modal-footer { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1rem; }
    .btn-cancel { background: transparent; border: 1px solid var(--border-bright); color: var(--text-muted); border-radius: 7px; padding: 0.5rem 1rem; font-size: 0.82rem; cursor: pointer; }
    .btn-cancel:hover { color: var(--text); }
    .btn-submit { background: var(--accent); color: #000; border: none; border-radius: 7px; padding: 0.5rem 1.2rem; font-size: 0.82rem; font-weight: 700; cursor: pointer; }
    .btn-submit:hover { opacity: 0.85; }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
    .auth-note { font-size: 0.72rem; color: var(--text-dim); margin-top: 0.3rem; }
    .msg-error { color: #e55; font-size: 0.75rem; margin-top: 0.5rem; }
    .msg-success { color: #4ec87a; font-size: 0.75rem; margin-top: 0.5rem; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 0.85rem; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 0.5rem; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Detail drawer ── */
    .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 800; }
    .detail-overlay.open { display: block; }
    #detail-drawer {
      position: absolute; right: 0; top: 0; bottom: 0; width: 460px; max-width: 100%;
      background: #141414; border-left: 1px solid #2a2a2a;
      display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform 0.22s ease;
    }
    .detail-overlay.open #detail-drawer { transform: translateX(0); }
    .detail-header {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.9rem 1rem; border-bottom: 1px solid #222; flex-shrink: 0;
    }
    .detail-body { flex: 1; overflow-y: auto; padding: 1.25rem; }
    .detail-title { font-size: 1.05rem; font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 1rem; }
    .detail-badges { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
    .detail-badge { font-size: 0.72rem; padding: 0.2rem 0.55rem; border-radius: 5px; font-weight: 600; text-transform: capitalize; }
    .badge-status-backlog { background: #1a1a1a; color: #888; }
    .badge-status-in_progress { background: #0a3a6e; color: #6ab0f5; }
    .badge-status-testing { background: #4a3500; color: #f0c040; }
    .badge-status-done { background: #0a3a1a; color: #4ec87a; }
    .badge-priority-critical { background: rgba(229,57,53,.15); color: #e53935; }
    .badge-priority-high { background: rgba(240,165,0,.15); color: #f0a500; }
    .badge-priority-medium { background: rgba(33,150,243,.15); color: #2196f3; }
    .badge-priority-low { background: rgba(80,80,80,.15); color: #666; }
    .detail-desc {
      font-size: 0.85rem; color: #c0c0c0; line-height: 1.65;
      margin-bottom: 1.25rem; white-space: pre-wrap; word-break: break-word;
      background: #0f0f0f; border: 1px solid #1e1e1e; border-radius: 6px; padding: 0.75rem 1rem;
    }
    .detail-meta { font-size: 0.73rem; color: var(--text-muted); border-top: 1px solid #1e1e1e; padding-top: 1rem; display: flex; flex-direction: column; gap: 0.45rem; }
    .detail-meta-row { display: flex; align-items: flex-start; gap: 0.5rem; }
    .detail-meta-label { color: var(--text-dim); min-width: 75px; flex-shrink: 0; }
    .btn-close-detail { background: none; border: none; color: #666; font-size: 1.1rem; cursor: pointer; padding: 0.2rem 0.5rem; border-radius: 4px; }
    .btn-close-detail:hover { color: var(--text); background: #1a1a1a; }
    .detail-id { font-size: 0.68rem; color: var(--text-dim); font-family: monospace; }
    .detail-labels { margin-bottom: 1rem; display: flex; flex-wrap: wrap; gap: 0.3rem; }

    /* ── Test voting panel ── */
    .test-panel { margin-top: 1.25rem; border-top: 1px solid #1e1e1e; padding-top: 1.1rem; }
    .test-panel-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #666; margin-bottom: 0.75rem; }
    .test-vote-row { display: flex; gap: 0.5rem; margin-bottom: 0.85rem; }
    .btn-test-vote {
      flex: 1; padding: 0.45rem 0.5rem; border-radius: 7px; font-size: 0.78rem; font-weight: 700;
      border: 1px solid #2a2a2a; background: #1a1a1a; color: #888; cursor: pointer; transition: all 0.15s;
    }
    .btn-test-vote:hover { border-color: #444; color: var(--text); }
    .btn-test-vote.vote-pass { background: rgba(78,200,122,0.12); border-color: #4ec87a; color: #4ec87a; }
    .btn-test-vote.vote-fail { background: rgba(229,57,53,0.12); border-color: #e53935; color: #e53935; }
    .test-community { font-size: 0.72rem; color: var(--text-muted); }
    .test-community-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.4rem; }
    .test-community-header span { font-size: 0.68rem; color: #555; }
    .test-vote-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0; border-bottom: 1px solid #181818; }
    .test-vote-item:last-child { border-bottom: none; }
    .test-vote-result { font-size: 0.8rem; }
    .test-vote-name { flex: 1; font-size: 0.72rem; }
    .test-vote-time { font-size: 0.65rem; color: #555; }
    .test-summary { display: flex; gap: 0.75rem; margin-bottom: 0.7rem; font-size: 0.75rem; }
    .test-summary-pass { color: #4ec87a; font-weight: 700; }
    .test-summary-fail { color: #e53935; font-weight: 700; }
    .test-owner-label { font-size: 0.68rem; color: #666; margin-bottom: 0.35rem; }

    /* ── Responsive ── */
    @media (max-width: 800px) {
      .kanban { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 500px) {
      .kanban { grid-template-columns: 1fr; }
      .stats { display: none; }
    }
  </style>
</head>
<body>
<script src=/shared/shell.js data-active="tasks"></script>
<div id=page-app>

  <!-- Scope selector -->
  <div class="scope-bar">
    <div class="scope-header">
      <!-- Golden spiral SVG icon -->
      <svg class="spiral-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 14 Q14 8 19 9.5 Q24 11 22.5 16 Q21 21 16 20.5 Q11 20 10.5 15 Q10 10 14.5 8.5 Q19 7 22 11 Q25 15 23 19.5 Q21 24 16.5 24.5"
              stroke="#f0a500" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.9"/>
        <circle cx="14" cy="14" r="1.5" fill="#f0a500" opacity="0.6"/>
      </svg>
      <span class="scope-title">Mission Control — Fibonacci Scope</span>
    </div>
    <div class="scope-tabs" id="scope-tabs"></div>
  </div>

  <!-- Controls bar -->
  <div class="board-controls">
    <div class="scope-desc" id="scope-desc">Loading…</div>
    <div class="stats" id="stats-bar"></div>
    <button class="btn-refresh" onclick="loadTasks()" title="Refresh">↻</button>
    <button class="btn-new" onclick="openModal()">+ New Task</button>
  </div>

  <!-- Kanban board -->
  <div class="kanban">
    <div class="col" data-status="backlog">
      <div class="col-header">Backlog <span class="col-count" id="count-backlog">0</span></div>
      <div class="col-body" id="col-backlog"><div class="loading"><span class="spinner"></span>Loading</div></div>
    </div>
    <div class="col" data-status="in_progress">
      <div class="col-header">In Progress <span class="col-count" id="count-in_progress">0</span></div>
      <div class="col-body" id="col-in_progress"></div>
    </div>
    <div class="col" data-status="testing">
      <div class="col-header">Testing <span class="col-count" id="count-testing">0</span></div>
      <div class="col-body" id="col-testing"></div>
    </div>
    <div class="col" data-status="done">
      <div class="col-header">Done <span class="col-count" id="count-done">0</span></div>
      <div class="col-body" id="col-done"></div>
    </div>
  </div>
</div>

<!-- Task detail drawer -->
<div class="detail-overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div id="detail-drawer">
    <div class="detail-header">
      <button class="btn-close-detail" onclick="closeDetail()" title="Close (Esc)">✕</button>
      <span class="detail-id" id="detail-id"></span>
      <div style="flex:1"></div>
      <span id="detail-scope-badge" class="scope-badge"></span>
    </div>
    <div class="detail-body">
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-badges" id="detail-badges"></div>
      <div class="detail-desc" id="detail-desc"></div>
      <div class="detail-labels" id="detail-labels"></div>
      <div class="detail-meta" id="detail-meta"></div>
      <div id="detail-test-panel"></div>
    </div>
  </div>
</div>

<!-- Create task modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>🎯 New Task</h2>
    <div class="form-group">
      <label>Title *</label>
      <input type=text id=f-title placeholder="What needs to be done?" maxlength=200>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id=f-desc placeholder="Context, acceptance criteria, links…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Priority</label>
        <select id=f-priority>
          <option value=low>Low</option>
          <option value=medium selected>Medium</option>
          <option value=high>High</option>
          <option value=critical>Critical</option>
        </select>
      </div>
      <div class="form-group">
        <label>Scope</label>
        <select id=f-scope></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select id=f-status>
          <option value=backlog selected>Backlog</option>
          <option value=in_progress>In Progress</option>
          <option value=testing>Testing</option>
          <option value=done>Done</option>
        </select>
      </div>
      <div class="form-group">
        <label>Assignee (name or key)</label>
        <input type=text id=f-assignee placeholder="Optional">
      </div>
    </div>
    <div class="form-group">
      <label>Labels (comma-separated)</label>
      <input type=text id=f-labels placeholder="backend, relay, urgent">
    </div>
    <div class="form-group">
      <label>Admin API Key <span style="font-weight:400;color:var(--text-muted)">(optional — or sign in at /chat)</span></label>
      <input type=password id=f-apikey placeholder="Leave blank if signed into /chat">
      <div class="auth-note">Signed-in relay users can create tasks without a key. Admins: <code>grep API_SECRET /opt/Humanity/.env</code></div>
    </div>
    <div id=form-msg></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" id=btn-submit onclick="submitTask()">Create Task</button>
    </div>
  </div>
</div>

<script>
/* ── Fibonacci scope definitions ── */
const SCOPES = [
  { n:1,  key:'self',    label:'Self',    color:'#ff6b6b', desc:'Personal health, body, daily needs' },
  { n:1,  key:'mind',    label:'Mind',    color:'#ff9f43', desc:'Learning, mental health, personal skills' },
  { n:2,  key:'hearth',  label:'Hearth',  color:'#ffd32a', desc:'Home, close relationships, household' },
  { n:3,  key:'circle',  label:'Circle',  color:'#0be881', desc:'Friend group / small team (3–8 people)' },
  { n:5,  key:'village', label:'Village', color:'#05c46b', desc:'Neighborhood / working group (8–21 people)' },
  { n:8,  key:'city',    label:'City',    color:'#0fbcf9', desc:'Project level — HumanityOS (default)' },
  { n:13, key:'region',  label:'Region',  color:'#7f8fa6', desc:'Large organization / national / bioregional' },
  { n:21, key:'world',   label:'World',   color:'#a29bfe', desc:'Civilization-wide, planetary goals' },
  { n:34, key:'solar',   label:'Solar',   color:'#74b9ff', desc:'Solar System — space stations, Mars colony' },
  { n:55, key:'cosmos',  label:'Cosmos',  color:'#dfe6e9', desc:'Interstellar civilization' },
];

let allTasks = [];
let activeScope = 'cosmos';
let openDetailId = null; // track currently open detail drawer for real-time updates

/* ── Init ── */
function init() {
  buildScopeTabs();
  buildScopeSelect();
  loadTasks();
  // Connect to relay for real-time updates if user has an identity
  setTimeout(ensureTaskWs, 1000);
}

function buildScopeTabs() {
  const container = document.getElementById('scope-tabs');
  container.innerHTML = SCOPES.map(s => `
    <button class="scope-tab${s.key === activeScope ? ' active' : ''}"
            data-key="${s.key}" onclick="setScope('${s.key}')"
            title="${s.desc}">
      <span class="scope-fib" style="color:${s.color}">${s.n}</span>
      <span class="scope-label">${s.label}</span>
      <span class="scope-tab-dot" style="background:${s.color}"></span>
    </button>`).join('');
}

function buildScopeSelect() {
  const sel = document.getElementById('f-scope');
  sel.innerHTML = SCOPES.map(s =>
    `<option value="${s.key}"${s.key === 'city' ? ' selected' : ''}>${s.n}·${s.label} — ${s.desc}</option>`
  ).join('');
}

function setScope(key) {
  activeScope = key;
  document.querySelectorAll('.scope-tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
  renderBoard();
  renderControls();
}

/* ── Data loading ── */
async function loadTasks() {
  try {
    const res = await fetch('/api/tasks');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allTasks = data.tasks || [];
    renderBoard();
    renderControls();
  } catch (e) {
    document.getElementById('col-backlog').innerHTML = `<div class="empty-col">⚠️ Could not load tasks<br><small>${e.message}</small></div>`;
  }
}

/* ── Scope helpers ── */
function getTaskScope(task) {
  try {
    const labels = JSON.parse(task.labels || '[]');
    const sl = labels.find(l => l.startsWith('scope:'));
    return sl ? sl.replace('scope:', '') : 'city';
  } catch { return 'city'; }
}

function getNonScopeLabels(task) {
  try { return JSON.parse(task.labels || '[]').filter(l => !l.startsWith('scope:')); }
  catch { return []; }
}

function scopedTasks() {
  return allTasks.filter(t => getTaskScope(t) === activeScope);
}

/* ── Render ── */
function renderBoard() {
  const tasks = scopedTasks();
  ['backlog','in_progress','testing','done'].forEach(status => {
    const col = document.getElementById('col-' + status);
    const count = document.getElementById('count-' + status);
    const filtered = tasks.filter(t => t.status === status);
    count.textContent = filtered.length;
    col.innerHTML = filtered.length
      ? filtered.map(renderCard).join('')
      : `<div class="empty-col">—</div>`;
  });
}

function renderControls() {
  const scope = SCOPES.find(s => s.key === activeScope) || SCOPES[5];
  document.getElementById('scope-desc').innerHTML =
    `<strong style="color:${scope.color}">${scope.n}·${scope.label}</strong> &mdash; ${scope.desc}`;
  const tasks = scopedTasks();
  const bp = allTasks.filter(t => t.status === 'backlog').length;
  const ip = allTasks.filter(t => t.status === 'in_progress').length;
  document.getElementById('stats-bar').innerHTML =
    `<span class="stat-pill"><span>${allTasks.length}</span> total</span>` +
    `<span class="stat-pill"><span>${tasks.length}</span> this scope</span>` +
    `<span class="stat-pill"><span>${ip}</span> active</span>`;
}

function renderCard(task) {
  const scope = SCOPES.find(s => s.key === getTaskScope(task)) || SCOPES[5];
  const labels = getNonScopeLabels(task);
  // Test tally for testing-column cards
  let testTally = '';
  if (task.status === 'testing' || task.status === 'done') {
    const tv = loadVotes()[task.id] || {};
    const passes = (tv.community||[]).filter(v=>v.result==='pass').length + (tv.owner==='pass'?1:0);
    const fails  = (tv.community||[]).filter(v=>v.result==='fail').length + (tv.owner==='fail'?1:0);
    if (passes || fails) {
      testTally = `<span class="test-tally">${passes?'✅'+passes:''}${fails?'❌'+fails:''}</span>`;
    } else if (task.status === 'testing') {
      testTally = `<span class="test-tally" style="color:#555">🧪</span>`;
    }
  }
  return `<div class="card priority-${task.priority}" onclick="openDetail(${task.id})">
    <div class="card-title">${esc(task.title)}</div>
    <div class="card-info">
      <span class="card-prio" style="color:${priorityColor(task.priority)}">${task.priority.toUpperCase()}</span>
      <span class="card-sep">·</span>
      <span>${timeAgo(task.created_at)}</span>
      <span class="card-sep">·</span>
      <span class="scope-badge" style="color:${scope.color}">${scope.n}·${scope.label}</span>
      ${labels.slice(0,3).map(l=>`<span class="label-tag">${esc(l)}</span>`).join('')}
      ${testTally}
    </div>
  </div>`;
}

/* ── Modal ── */
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-title').focus();
  document.getElementById('form-msg').innerHTML = '';
  document.getElementById('f-scope').value = activeScope;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// WebSocket connection for task creation by authenticated relay users.
let taskWs = null;
let taskWsReady = false;
let taskWsPending = null; // resolve fn waiting for task_created confirmation

function ensureTaskWs() {
  if (taskWs && taskWs.readyState === WebSocket.OPEN) return;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const raw = localStorage.getItem('humanity_key_backup');
  if (!raw) return;
  let pub;
  try { pub = JSON.parse(raw).publicKeyHex; } catch { return; }
  if (!pub) return;
  const name = localStorage.getItem('humanity_name') || 'Task_User';
  taskWs = new WebSocket(`${proto}//${location.host}/ws`);
  taskWs.addEventListener('open', () => {
    taskWs.send(JSON.stringify({ type: 'identify', public_key: pub, display_name: name }));
  });
  taskWs.addEventListener('message', e => {
    try {
      const m = JSON.parse(e.data);
      // Resolve pending create promise
      if (m.type === 'task_created' && taskWsPending) { taskWsPending(m.task); taskWsPending = null; }
      if (m.type === 'system' && m.message && taskWsPending) { taskWsPending(null, m.message); taskWsPending = null; }
      // Real-time board updates — add/update tasks without full reload
      if (m.type === 'task_created') {
        if (!allTasks.find(t => t.id === m.task.id)) { allTasks.push(m.task); renderBoard(); }
      }
      if (m.type === 'task_updated') {
        const idx = allTasks.findIndex(t => t.id === m.task.id);
        if (idx >= 0) { allTasks[idx] = { ...allTasks[idx], ...m.task }; } else { allTasks.push(m.task); }
        renderBoard();
        if (document.getElementById('detail-overlay').classList.contains('open') && openDetailId === m.task.id) openDetail(m.task.id);
      }
    } catch {}
  });
  // Reconnect on close
  taskWs.addEventListener('close', () => {
    taskWs = null;
    setTimeout(ensureTaskWs, 5000);
  });
}

async function submitTask() {
  const title = document.getElementById('f-title').value.trim();
  const apiKey = document.getElementById('f-apikey').value.trim();
  const msg = document.getElementById('form-msg');

  if (!title) { msg.innerHTML = '<div class="msg-error">Title is required.</div>'; return; }

  const rawLabels = document.getElementById('f-labels').value.trim();
  const labelArr = rawLabels ? rawLabels.split(',').map(l => l.trim()).filter(Boolean) : [];
  labelArr.push('scope:' + document.getElementById('f-scope').value);

  const body = {
    title,
    description: document.getElementById('f-desc').value.trim(),
    priority: document.getElementById('f-priority').value,
    status: document.getElementById('f-status').value,
    labels: JSON.stringify(labelArr),
  };
  const assignee = document.getElementById('f-assignee').value.trim();
  if (assignee) body.assignee = assignee;

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Creating…';

  // Use API key if provided; otherwise use relay WebSocket (signed-in users).
  if (apiKey) {
    try {
      const res = await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'HTTP ' + res.status);
      msg.innerHTML = `<div class="msg-success">✓ Task #${data.id} created.</div>`;
      setTimeout(() => { closeModal(); loadTasks(); }, 800);
    } catch(e) {
      msg.innerHTML = `<div class="msg-error">Error: ${esc(e.message)}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Task';
    }
  } else {
    // Relay WebSocket path — requires humanity_key_backup in localStorage.
    ensureTaskWs();
    if (!taskWs || taskWs.readyState !== WebSocket.OPEN) {
      // Give it 1.5s to connect
      await new Promise(r => setTimeout(r, 1500));
    }
    if (!taskWs || taskWs.readyState !== WebSocket.OPEN) {
      msg.innerHTML = '<div class="msg-error">Not signed in. Enter Admin API Key or sign in at /chat first.</div>';
      btn.disabled = false;
      btn.textContent = 'Create Task';
      return;
    }
    try {
      const task = await new Promise((resolve, reject) => {
        taskWsPending = (task, err) => err ? reject(new Error(err)) : resolve(task);
        taskWs.send(JSON.stringify({ type: 'task_create', ...body }));
        setTimeout(() => { if (taskWsPending) { taskWsPending = null; reject(new Error('Timeout')); } }, 5000);
      });
      msg.innerHTML = `<div class="msg-success">✓ Task #${task?.id || '?'} created.</div>`;
      setTimeout(() => { closeModal(); loadTasks(); }, 800);
    } catch(e) {
      msg.innerHTML = `<div class="msg-error">Error: ${esc(e.message)}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Task';
    }
  }
}

function openDetail(id) {
  openDetailId = id;
  const task = allTasks.find(t => t.id === id);
  if (!task) return;

  const scope = SCOPES.find(s => s.key === getTaskScope(task)) || SCOPES[5];
  const labels = getNonScopeLabels(task);

  document.getElementById('detail-id').textContent = '#' + task.id;
  document.getElementById('detail-title').textContent = task.title;

  const scopeBadge = document.getElementById('detail-scope-badge');
  scopeBadge.textContent = scope.n + '·' + scope.label;
  scopeBadge.style.color = scope.color;

  const statusLabel = task.status.replace(/_/g, ' ');
  document.getElementById('detail-badges').innerHTML =
    `<span class="detail-badge badge-status-${task.status}">${statusLabel}</span>` +
    `<span class="detail-badge badge-priority-${task.priority}">${task.priority}</span>`;

  document.getElementById('detail-desc').textContent = task.description || '(No description)';

  document.getElementById('detail-labels').innerHTML = labels.length
    ? labels.map(l => `<span class="label-tag">${esc(l)}</span>`).join('')
    : '';

  const created = task.created_at ? new Date(task.created_at).toLocaleString() : '—';
  const age = task.created_at ? timeAgo(task.created_at) + ' ago' : '';
  document.getElementById('detail-meta').innerHTML =
    `<div class="detail-meta-row"><span class="detail-meta-label">Created</span><span>${created}${age ? ' · ' + age : ''}</span></div>` +
    (task.assignee ? `<div class="detail-meta-row"><span class="detail-meta-label">Assignee</span><span>${esc(task.assignee)}</span></div>` : '') +
    (task.comment_count > 0 ? `<div class="detail-meta-row"><span class="detail-meta-label">Comments</span><span>${task.comment_count}</span></div>` : '');

  // Test voting panel (shown for testing and done tasks)
  const testPanelEl = document.getElementById('detail-test-panel');
  if (task.status === 'testing' || task.status === 'done') {
    testPanelEl.innerHTML = renderTestPanel(task);
  } else {
    testPanelEl.innerHTML = '';
  }

  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
}

/* ── Test vote storage ── */
const VOTES_KEY = 'hos_task_votes';
function loadVotes() { try { return JSON.parse(localStorage.getItem(VOTES_KEY)) || {}; } catch { return {}; } }
function saveVotes(v) { localStorage.setItem(VOTES_KEY, JSON.stringify(v)); }

/* ── Lightweight identity reader (uses chat page's localStorage backup) ── */
let _voteId = null, _voteIdTried = false;
async function getVoteIdentity() {
  if (_voteIdTried) return _voteId;
  _voteIdTried = true;
  try {
    const raw = localStorage.getItem('humanity_key_backup');
    if (!raw) return null;
    const { publicKeyHex, privateKeyPkcs8 } = JSON.parse(raw);
    if (!publicKeyHex || !privateKeyPkcs8) return null;
    const buf = Uint8Array.from(atob(privateKeyPkcs8), c => c.charCodeAt(0));
    const pk  = await crypto.subtle.importKey('pkcs8', buf, 'Ed25519', false, ['sign']);
    _voteId = { publicKeyHex, privateKey: pk };
  } catch(e) { /* unsigned votes still work */ }
  return _voteId;
}
async function signVote(taskId, result) {
  const id = await getVoteIdentity();
  if (!id) return null;
  try {
    const ts  = Date.now();
    const msg = `vote:${taskId}:${result}:${ts}`;
    const sig = await crypto.subtle.sign('Ed25519', id.privateKey, new TextEncoder().encode(msg));
    return { sig: [...new Uint8Array(sig)].map(b=>b.toString(16).padStart(2,'0')).join(''), pub: id.publicKeyHex, ts };
  } catch { return null; }
}

/**
 * Cast the owner/determining test vote on a task. Signs with Ed25519 if
 * the chat identity is available in localStorage. Toggling the same result clears it.
 */
async function castOwnerVote(taskId, result) {
  const v = loadVotes();
  if (!v[taskId]) v[taskId] = { owner: null, community: [] };
  if (v[taskId].owner === result) {
    v[taskId].owner = null;
    delete v[taskId].ownerSig;
    delete v[taskId].ownerPub;
  } else {
    v[taskId].owner = result;
    const proof = await signVote(taskId, result);
    if (proof) { v[taskId].ownerSig = proof.sig; v[taskId].ownerPub = proof.pub; v[taskId].ownerTs = proof.ts; }
  }
  saveVotes(v);
  openDetail(taskId);
  renderBoard();
}

/**
 * Cast a community test vote (non-determining, but visible to the owner).
 * Re-voting replaces the previous community vote from this browser.
 */
function castCommunityVote(taskId, result) {
  const v = loadVotes();
  if (!v[taskId]) v[taskId] = { owner: null, community: [] };
  const already = v[taskId].community.find(x => x.device === '_local');
  if (already) {
    if (already.result === result) {
      v[taskId].community = v[taskId].community.filter(x => x.device !== '_local');
    } else {
      already.result = result;
      already.time = Date.now();
    }
  } else {
    const id = await getVoteIdentity();
    v[taskId].community.push({
      device: '_local',
      name: id ? id.publicKeyHex.slice(0,12) + '…' : 'Anonymous',
      pub: id ? id.publicKeyHex : null,
      result,
      time: Date.now(),
    });
  }
  saveVotes(v);
  openDetail(taskId);
  renderBoard();
}
castCommunityVote = async function(taskId, result) {
  const v = loadVotes();
  if (!v[taskId]) v[taskId] = { owner: null, community: [] };
  const already = v[taskId].community.find(x => x.device === '_local');
  if (already) {
    if (already.result === result) {
      v[taskId].community = v[taskId].community.filter(x => x.device !== '_local');
    } else {
      already.result = result;
      already.time = Date.now();
    }
    saveVotes(v); openDetail(taskId); renderBoard();
  } else {
    const id = await getVoteIdentity();
    v[taskId].community.push({
      device: '_local',
      name: id ? id.publicKeyHex.slice(0,12) + '…' : 'Anonymous',
      pub: id ? id.publicKeyHex : null,
      result, time: Date.now(),
    });
    saveVotes(v); openDetail(taskId); renderBoard();
  }
};

/**
 * Build the test-voting panel HTML for the task detail drawer.
 * Owner vote is the determining vote; community votes are advisory.
 */
function renderTestPanel(task) {
  const tv = loadVotes()[task.id] || { owner: null, community: [] };
  const ownerPass = tv.owner === 'pass';
  const ownerFail = tv.owner === 'fail';
  const community = tv.community || [];
  const cPass = community.filter(v=>v.result==='pass').length;
  const cFail = community.filter(v=>v.result==='fail').length;
  const totalPass = cPass + (ownerPass?1:0);
  const totalFail = cFail + (ownerFail?1:0);

  const communityRows = community.length
    ? community.map(v => `
        <div class="test-vote-item">
          <span class="test-vote-result">${v.result==='pass'?'✅':'❌'}</span>
          <span class="test-vote-name">${esc(v.name||'Anonymous')}</span>
          <span class="test-vote-time">${v.time ? timeAgo(v.time)+' ago' : ''}</span>
        </div>`).join('')
    : `<div style="font-size:0.72rem;color:#555;padding:.2rem 0">No community votes yet.</div>`;

  return `
    <div class="test-panel">
      <div class="test-panel-title">🧪 Test Results</div>
      ${totalPass || totalFail
        ? `<div class="test-summary">
             <span class="test-summary-pass">✅ ${totalPass} pass</span>
             <span class="test-summary-fail">❌ ${totalFail} fail</span>
           </div>`
        : ''}
      <div class="test-owner-label">Your vote (determining)${tv.ownerPub ? ` · <code style="font-size:.6rem;color:#555">${tv.ownerPub.slice(0,16)}…</code> ✍️` : ' · unsigned'}:</div>
      <div class="test-vote-row">
        <button class="btn-test-vote${ownerPass?' vote-pass':''}" onclick="castOwnerVote(${task.id},'pass')">
          ✅ Pass${ownerPass?' ← your vote':''}
        </button>
        <button class="btn-test-vote${ownerFail?' vote-fail':''}" onclick="castOwnerVote(${task.id},'fail')">
          ❌ Fail${ownerFail?' ← your vote':''}
        </button>
      </div>
      <div class="test-community">
        <div class="test-community-header">
          <span style="font-size:0.68rem;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Community votes</span>
          <span>${cPass} pass · ${cFail} fail</span>
        </div>
        ${communityRows}
        <div style="margin-top:.55rem;display:flex;gap:.4rem">
          <button class="btn-test-vote${community.find(v=>v.device==='_local')?.result==='pass'?' vote-pass':''}"
                  style="font-size:.72rem;padding:.3rem .5rem"
                  onclick="castCommunityVote(${task.id},'pass')">✅ I tested it — works</button>
          <button class="btn-test-vote${community.find(v=>v.device==='_local')?.result==='fail'?' vote-fail':''}"
                  style="font-size:.72rem;padding:.3rem .5rem"
                  onclick="castCommunityVote(${task.id},'fail')">❌ Broken</button>
        </div>
      </div>
    </div>`;
}

/* ── Helpers ── */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function priorityColor(p) {
  return { critical:'#e53935', high:'#f0a500', medium:'#2196f3', low:'#555' }[p] || '#555';
}

function timeAgo(ms) {
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h';
  return Math.floor(s/86400) + 'd';
}

/* Close modal on overlay click */
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

/* Escape key */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetail(); closeModal(); }
});

init();
