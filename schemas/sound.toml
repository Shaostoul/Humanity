# FULL EXAMPLES
# ---------------------------------------------------------------------------

[[examples]]
name = "Forest Day Ambience (ambient loop)"
csv_row = "amb_forest_day,Forest Day Ambience,ambient,ambient/forest_day.ogg,0.4,1.0,1.0,false,1.0,50.0,true,2.0,0.0,0.0,2,ambient,,day|outdoor|peaceful"
breakdown = """
  id                      = amb_forest_day
  name                    = Forest Day Ambience
  category                = ambient
  file_path               = ambient/forest_day.ogg
  volume                  = 0.4          (quiet background layer)
  pitch_range_min         = 1.0          (no pitch variation)
  pitch_range_max         = 1.0
  spatial                 = false         (plays everywhere, not positioned)
  falloff_min_m           = 1.0          (ignored, not spatial)
  falloff_max_m           = 50.0         (ignored, not spatial)
  loop                    = true          (continuous ambient bed)
  loop_crossfade_s        = 2.0          (smooth loop transition)
  random_delay_range_min  = 0.0          (plays continuously, not random)
  random_delay_range_max  = 0.0
  priority                = 2            (low, can be culled)
  bus                     = ambient       (ambient volume slider)
  variations              =              (single file, no variants)
  tags                    = day|outdoor|peaceful"""

[[examples]]
name = "Sword Hit (spatial combat SFX)"
csv_row = "sfx_sword_hit,Sword Hit,sfx,sfx/sword_hit_01.wav,0.9,0.9,1.1,true,1.0,30.0,false,0.0,0.0,0.0,7,sfx,sfx/sword_hit_02.wav|sfx/sword_hit_03.wav,combat|outdoor|indoor"
breakdown = """
  id                      = sfx_sword_hit
  name                    = Sword Hit
  category                = sfx
  file_path               = sfx/sword_hit_01.wav
  volume                  = 0.9          (loud combat feedback)
  pitch_range_min         = 0.9          (slight pitch variation)
  pitch_range_max         = 1.1          (adds variety)
  spatial                 = true          (positioned at the hit location)
  falloff_min_m           = 1.0          (full volume within 1 meter)
  falloff_max_m           = 30.0         (inaudible beyond 30 meters)
  loop                    = false         (one-shot impact)
  loop_crossfade_s        = 0.0          (not looping)
  random_delay_range_min  = 0.0          (plays immediately on trigger)
  random_delay_range_max  = 0.0
  priority                = 7            (high, combat feedback)
  bus                     = sfx           (SFX volume slider)
  variations              = sfx/sword_hit_02.wav|sfx/sword_hit_03.wav
  tags                    = combat|outdoor|indoor"""

[[examples]]
name = "Grass Footstep (spatial footstep with variations)"
csv_row = "ft_grass,Grass Footstep,footstep,footsteps/grass_01.wav,0.6,0.85,1.15,true,0.5,15.0,false,0.0,0.0,0.0,5,sfx,footsteps/grass_02.wav|footsteps/grass_03.wav|footsteps/grass_04.wav,outdoor|peaceful|combat"
breakdown = """
  id                      = ft_grass
  name                    = Grass Footstep
  category                = footstep
  file_path               = footsteps/grass_01.wav
  volume                  = 0.6          (moderate, not distracting)
  pitch_range_min         = 0.85         (wide pitch range for natural feel)
  pitch_range_max         = 1.15
  spatial                 = true          (positioned at the walker)
  falloff_min_m           = 0.5          (quiet up close)
  falloff_max_m           = 15.0         (inaudible beyond 15 meters)
  loop                    = false         (one-shot per step)
  loop_crossfade_s        = 0.0
  random_delay_range_min  = 0.0          (triggered by movement system)
  random_delay_range_max  = 0.0
  priority                = 5            (standard, cullable under load)
  bus                     = sfx           (SFX volume slider)
