[[examples]]
name = "Tornado (catastrophic event)"
csv_row = "tornado,Tornado,tornado,Whirling funnel of destructive wind,tornado,0.0,200.0,70.0,360.0,0.6,rain,0.3,env_debris_impact,0.8,0.9,0.1,1.8,0.3,1.0,amb_tornado_roar,#3A3A3A,#4A4A4A,120,600,10.0,temperate:5|plains:8|savanna:3,0.5:1.0:0.5:0.0,catastrophic"
breakdown = """
  id                              = tornado
  name                            = Tornado
  type                            = tornado
  description                     = Whirling funnel of destructive wind
  temperature_modifier_c          = 0.0        (no change)
  visibility_range_m              = 200.0      (debris-filled air)
  wind_speed_mps                  = 70.0       (destructive force)
  wind_direction_variance_deg     = 360.0      (fully chaotic)
  precipitation_rate              = 0.6        (heavy rain accompanies)
  precipitation_type              = rain
  lightning_chance_per_min         = 0.3        (frequent lightning)
  effect_on_player                = env_debris_impact  (damage from flying objects)
  effect_on_crops_growth_modifier = 0.8        (disrupted but not frozen)
  effect_on_crops_damage_chance   = 0.9        (almost certain destruction)
  effect_on_solar_power           = 0.1        (minimal sunlight)
  effect_on_fire_spread_modifier  = 1.8        (wind fans flames)
  movement_speed_modifier         = 0.3        (barely movable)
  noise_level                     = 1.0        (deafening roar)
  ambient_sound_id                = amb_tornado_roar
  sky_color_hex                   = #3A3A3A    (dark ominous sky)
  fog_color_hex                   = #4A4A4A    (dark debris haze)
  duration_range_min_s            = 120        (2 minutes minimum)
  duration_range_max_s            = 600        (10 minutes maximum)
  transition_time_s               = 10.0       (sudden onset)
  biome_weights                   = temperate:5|plains:8|savanna:3
  season_weights                  = 0.5:1.0:0.5:0.0  (summer peak)
  severity                        = catastrophic"""
