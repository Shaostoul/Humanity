<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills — HumanityOS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Layout ── */
    #skills-app {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 42px); /* below nav */
    }

    /* ── Sidebar ── */
    #domain-sidebar {
      width: 220px;
      min-width: 180px;
      background: #111;
      border-right: 1px solid #222;
      overflow-y: auto;
      padding: 1rem 0;
      flex-shrink: 0;
    }

    #domain-sidebar h2 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      padding: 0 1rem 0.5rem;
    }

    .domain-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 1rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .domain-item:hover { background: #1a1a1a; }
    .domain-item.active {
      background: #181818;
      border-left-color: var(--domain-color);
    }

    .domain-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--domain-color);
      flex-shrink: 0;
    }

    .domain-name {
      flex: 1;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .domain-avg {
      font-size: 0.7rem;
      color: #666;
      min-width: 24px;
      text-align: right;
    }

    /* Mini progress bar under label */
    .domain-bar-wrap {
      height: 2px;
      background: #222;
      border-radius: 1px;
      margin-top: 2px;
    }
    .domain-bar-fill {
      height: 100%;
      border-radius: 1px;
      background: var(--domain-color);
      transition: width 0.4s;
    }

    /* ── Main Panel ── */
    #skill-panel {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }

    #skill-panel-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #222;
    }

    #panel-domain-icon {
      font-size: 2rem;
      line-height: 1;
    }

    #panel-domain-title {
      font-size: 1.4rem;
      font-weight: 700;
    }

    #panel-domain-desc {
      font-size: 0.8rem;
      color: #888;
      margin-top: 0.2rem;
    }

    #panel-domain-overall {
      margin-left: auto;
      text-align: right;
    }

    #panel-domain-overall .big-level {
      font-size: 2rem;
      font-weight: 800;
      color: var(--active-color, #FF8811);
      line-height: 1;
    }

    #panel-domain-overall .big-label {
      font-size: 0.65rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Skill Cards ── */
    .skill-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .skill-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .skill-card:hover {
      border-color: #333;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    .skill-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }

    .skill-name {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .skill-tags {
      font-size: 0.65rem;
      color: #666;
      margin-top: 0.15rem;
    }

    .skill-level-badge {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--active-color, #FF8811);
      line-height: 1;
      min-width: 32px;
      text-align: right;
    }

    .skill-level-label {
      font-size: 0.6rem;
      color: #555;
      text-align: right;
      text-transform: uppercase;
    }

    .skill-desc {
      font-size: 0.75rem;
      color: #777;
      margin-bottom: 0.8rem;
      line-height: 1.4;
    }

    /* XP bar */
    .xp-bar-wrap {
      height: 6px;
      background: #1e1e1e;
      border-radius: 3px;
      margin-bottom: 0.8rem;
      position: relative;
    }
    .xp-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--active-color, #FF8811);
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .xp-bar-text {
      position: absolute;
      right: 0;
      top: 8px;
      font-size: 0.6rem;
      color: #555;
    }

    /* Level steps */
    .level-steps {
      display: flex;
      gap: 3px;
      margin-bottom: 0.9rem;
    }
    .level-pip {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #1e1e1e;
      cursor: pointer;
      transition: background 0.2s;
    }
    .level-pip.filled { background: var(--active-color, #FF8811); }
    .level-pip:hover { opacity: 0.8; }

    /* XP action buttons */
    .xp-actions {
      display: flex;
      gap: 0.4rem;
      align-items: center;
    }

    .xp-btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #aaa;
      border-radius: 4px;
      padding: 0.25rem 0.55rem;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .xp-btn:hover { background: #222; border-color: #444; color: #fff; }
    .xp-btn.primary {
      background: color-mix(in srgb, var(--active-color, #FF8811) 15%, transparent);
      border-color: color-mix(in srgb, var(--active-color, #FF8811) 40%, transparent);
      color: var(--active-color, #FF8811);
    }
    .xp-btn.primary:hover {
      background: color-mix(in srgb, var(--active-color, #FF8811) 25%, transparent);
    }

    .xp-current {
      margin-left: auto;
      font-size: 0.7rem;
      color: #555;
    }

    /* Level up flash */
    @keyframes levelup-flash {
      0%   { box-shadow: 0 0 0 0 var(--active-color); }
      50%  { box-shadow: 0 0 0 8px transparent; }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
    .skill-card.levelup { animation: levelup-flash 0.6s ease-out; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      font-size: 0.82rem;
      color: #eee;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 9999;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Empty state ── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60%;
      color: #444;
      gap: 0.5rem;
    }
    #empty-state .big { font-size: 3rem; }
    #empty-state p { font-size: 0.85rem; }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      #domain-sidebar { width: 160px; min-width: 140px; }
      #skill-panel { padding: 1rem; }
      .skill-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

// ─────────────────────────────────────────────
// XP thresholds per level (0→1, 1→2, … 9→10)
// ─────────────────────────────────────────────
const XP_PER_LEVEL = [100, 150, 225, 338, 507, 760, 1140, 1710, 2565, 3848];
const MAX_LEVEL = 10;

// Storage key
const STORAGE_KEY = 'hos_skills_v1';

// State: { [skillId]: { level: 0-10, xp: 0 } }
let skillData = {};

function loadSkillData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) skillData = JSON.parse(raw);
  } catch (e) { skillData = {}; }
}

function saveSkillData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(skillData));
}

function getSkill(id) {
  if (!skillData[id]) skillData[id] = { level: 0, xp: 0 };
  return skillData[id];
}

function xpForLevel(level) {
  if (level >= MAX_LEVEL) return Infinity;
  return XP_PER_LEVEL[level] || 100;
}

function addXp(skillId, amount, cardEl) {
  const s = getSkill(skillId);
  if (s.level >= MAX_LEVEL) { showToast('Max level reached!'); return; }
  s.xp += amount;
  let leveled = false;
  while (s.level < MAX_LEVEL && s.xp >= xpForLevel(s.level)) {
    s.xp -= xpForLevel(s.level);
    s.level++;
    leveled = true;
  }
  saveSkillData();
  refreshCard(skillId, cardEl);
  if (leveled) {
    cardEl.classList.remove('levelup');
    void cardEl.offsetWidth; // reflow
    cardEl.classList.add('levelup');
    showToast('🎉 Level up! ' + getSkillById(skillId).name + ' → Lv ' + s.level);
  }
  updateSidebar();
}

function setLevel(skillId, level, cardEl) {
  const s = getSkill(skillId);
  s.level = Math.max(0, Math.min(MAX_LEVEL, level));
  s.xp = 0;
  saveSkillData();
  refreshCard(skillId, cardEl);
  updateSidebar();
}

function getSkillById(id) {
  for (const d of DOMAINS) {
    for (const s of d.skills) { if (s.id === id) return s; }
  }
  return null;
}

// ─────────────────────────────────────────────
// Rendering
// ─────────────────────────────────────────────
let activeDomain = null;

function domainAvg(domain) {
  const levels = domain.skills.map(s => getSkill(s.id).level);
  return levels.reduce((a, b) => a + b, 0) / levels.length;
}

function renderSidebar() {
  const list = document.getElementById('domain-list');
  list.innerHTML = DOMAINS.map(d => {
    const avg = domainAvg(d);
    const pct = (avg / MAX_LEVEL * 100).toFixed(1);
    const isActive = activeDomain && activeDomain.id === d.id;
    return `<div class="domain-item${isActive ? ' active' : ''}" style="--domain-color:${d.color}" data-id="${d.id}" onclick="selectDomain('${d.id}')">
      <div class="domain-dot"></div>
      <div style="flex:1;min-width:0">
        <div class="domain-name">${d.label}</div>
        <div class="domain-bar-wrap"><div class="domain-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="domain-avg">${avg.toFixed(1)}</div>
    </div>`;
  }).join('');
}

function updateSidebar() {
  // Only re-render sidebar items, not the whole sidebar
  renderSidebar();
  if (activeDomain) {
    // Update avg in header
    const avg = domainAvg(activeDomain);
    document.getElementById('panel-avg-level').textContent = avg.toFixed(1);
  }
}

function selectDomain(id) {
  activeDomain = DOMAINS.find(d => d.id === id);
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('domain-content').style.display = 'block';
  document.documentElement.style.setProperty('--active-color', activeDomain.color);

  document.getElementById('panel-domain-icon').textContent = activeDomain.icon;
  document.getElementById('panel-domain-title').textContent = activeDomain.label;
  document.getElementById('panel-domain-desc').textContent = activeDomain.desc;

  const avg = domainAvg(activeDomain);
  document.getElementById('panel-avg-level').textContent = avg.toFixed(1);

  renderSkillGrid(activeDomain);
  updateSidebar();
}

function renderSkillGrid(domain) {
  const grid = document.getElementById('skill-grid');
  grid.innerHTML = domain.skills.map(skill => buildSkillCard(skill, domain.color)).join('');
}

function buildSkillCard(skill, color) {
  const s = getSkill(skill.id);
  const needed = xpForLevel(s.level);
  const xpPct = s.level >= MAX_LEVEL ? 100 : Math.min(100, (s.xp / needed * 100));
  const pips = Array.from({length: MAX_LEVEL}, (_, i) =>
    `<div class="level-pip${i < s.level ? ' filled' : ''}" onclick="pipClick('${skill.id}', ${i+1}, this)"></div>`
  ).join('');

  const endorsement = skillEndorsements[skill.id.toLowerCase()];
  const endorseBadge = endorsement && endorsement.count > 0
    ? `<span style="font-size:0.7rem;color:#ffd700;margin-top:0.2rem;display:block;" title="Endorsed by ${endorsement.last_endorser || 'a peer'}">🏅 ${endorsement.count}</span>`
    : '';

  return `<div class="skill-card" id="card-${skill.id}">
    <div class="skill-card-header">
      <div>
        <div class="skill-name">${skill.name}</div>
        <div class="skill-tags">${skill.tags}</div>
      </div>
      <div style="text-align:center">
        <div class="skill-level-badge">${s.level}</div>
        <div class="skill-level-label">Level</div>
        ${endorseBadge}
      </div>
    </div>
    <div class="skill-desc">${skill.desc}</div>
    <div class="level-steps">${pips}</div>
    <div class="xp-bar-wrap">
      <div class="xp-bar-fill" style="width:${xpPct}%"></div>
      <div class="xp-bar-text">${s.level >= MAX_LEVEL ? 'MAX' : s.xp + '/' + needed + ' XP'}</div>
    </div>
    <div class="xp-actions">
      <button class="xp-btn" onclick="addXp('${skill.id}', 10, document.getElementById('card-${skill.id}'))">+10 XP</button>
      <button class="xp-btn primary" onclick="addXp('${skill.id}', 50, document.getElementById('card-${skill.id}'))">+50 XP</button>
      <button class="xp-btn" onclick="addXp('${skill.id}', 100, document.getElementById('card-${skill.id}'))">+100 XP</button>
      <span class="xp-current">${s.level >= MAX_LEVEL ? '✓ Mastered' : 'Total XP: ' + totalXp(skill.id)}</span>
    </div>
  </div>`;
}

function pipClick(skillId, level, pipEl) {
  // Clicking a pip sets level directly (tap to set level)
  const cardEl = document.getElementById('card-' + skillId);
  const s = getSkill(skillId);
  // If clicking the current level pip, decrement; else set that level
  const newLevel = s.level === level ? level - 1 : level;
  setLevel(skillId, newLevel, cardEl);
}

function refreshCard(skillId, cardEl) {
  const skill = getSkillById(skillId);
  if (!skill) return;
  const color = activeDomain ? activeDomain.color : '#FF8811';
  cardEl.outerHTML = buildSkillCard(skill, color);
  // outerHTML replaces the element, need to re-query
}

function totalXp(skillId) {
  const s = getSkill(skillId);
  let total = s.xp;
  for (let i = 0; i < s.level; i++) total += XP_PER_LEVEL[i] || 0;
  return total;
}

// ─────────────────────────────────────────────
// Toast
// ─────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
loadSkillData();
renderSidebar();

// Auto-select first domain or last used
const lastDomain = localStorage.getItem('hos_skills_last_domain');
if (lastDomain && DOMAINS.find(d => d.id === lastDomain)) {
  selectDomain(lastDomain);
}

// Save last selected domain on change
const origSelect = selectDomain;
window.selectDomain = function(id) {
  origSelect(id);
  localStorage.setItem('hos_skills_last_domain', id);
};

// ── Endorsement counts from relay ──
// Keyed by skill_id (lowercase), value is { count, last_endorser }
let skillEndorsements = {};

/** Hook called by app.js when relay sends back endorsement counts. */
window.onSkillEndorsementsReceived = function(data) {
  if (!data || !Array.isArray(data.endorsements)) return;
  skillEndorsements = {};
  for (const e of data.endorsements) {
    skillEndorsements[e.skill_id.toLowerCase()] = { count: e.count, last_endorser: e.last_endorser };
  }
  // Re-render current domain to show updated badges
  if (activeDomain) renderSkillGrid(activeDomain);
};

/** Request endorsement counts from relay if connected. */
function loadEndorsements() {
  if (typeof requestSkillEndorsements === 'function') {
    requestSkillEndorsements();
  }
}

// Try loading endorsements once page has had time to connect (3 s delay).
setTimeout(loadEndorsements, 3000);

// ── Relay sync — push skill levels to server when user is signed in ──
// This keeps the relay's skill_verifications/skill_dns table current so
// /api/skills/{key} and /api/skills/search return accurate data.
(function initSkillRelaySync() {
  const raw = localStorage.getItem('humanity_key_backup');
  if (!raw) return; // not signed in
  let pub, name;
  try { const b = JSON.parse(raw); pub = b.publicKeyHex; name = localStorage.getItem('humanity_name') || 'user'; }
  catch { return; }
  if (!pub) return;

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.addEventListener('open', () => {
    ws.send(JSON.stringify({ type: 'identify', public_key: pub, display_name: name }));
  });

  ws.addEventListener('message', e => {
    try {
      const m = JSON.parse(e.data);
      // Once identified, send all skills with a non-zero level
      if (m.type === 'identified') {
        const data = skillData || {};
        for (const [sid, sk] of Object.entries(data)) {
          if (!sk || !sk.level) continue;
          ws.send(JSON.stringify({
            type: 'skill_update',
            skill_id: sid,
            reality_xp: sk.xp || 0,
            fantasy_xp: 0,
            level: sk.level,
          }));
        }
        // Done — no need to keep the socket open
        setTimeout(() => ws.close(), 500);
      }
    } catch {}
  });

  ws.addEventListener('error', () => ws.close());
})();
</script>
