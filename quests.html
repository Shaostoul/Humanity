<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quests — HumanityOS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Two-column layout ── */
    #quests-app {
      display: flex;
      flex: 1;
      height: calc(100vh - 42px);
      overflow: hidden;
    }

    /* ── Left sidebar: categories ── */
    #quest-sidebar {
      width: 200px;
      min-width: 160px;
      background: #111;
      border-right: 1px solid #222;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #quest-sidebar h2 {
      font-size: 0.68rem;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.75rem 0.8rem 0.4rem;
    }
    .q-cat {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0.8rem;
      cursor: pointer;
      border-radius: 6px;
      margin: 0 0.4rem 0.15rem;
      font-size: 0.88rem;
      color: #aaa;
      transition: background 0.12s, color 0.12s;
      border: 1px solid transparent;
    }
    .q-cat:hover { background: #1a1a1a; color: #eee; }
    .q-cat.active {
      background: #181818;
      color: #fff;
      border-color: #2a6;
    }
    .q-cat .q-cat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .q-cat .q-cat-count {
      margin-left: auto;
      font-size: 0.72rem;
      background: #222;
      color: #888;
      padding: 1px 5px;
      border-radius: 10px;
    }

    /* ── Right: quest list + modal ── */
    #quest-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #quest-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #1e1e1e;
      background: #0f0f0f;
      flex-shrink: 0;
    }
    #quest-header h1 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      flex: 1;
    }
    #quest-search {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 0.3rem 0.7rem;
      font-size: 0.85rem;
      width: 180px;
      outline: none;
    }
    #quest-search:focus { border-color: #2a6; }
    #add-quest-btn {
      background: #1a4a2a;
      border: 1px solid #2a6;
      color: #4d9;
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.12s;
    }
    #add-quest-btn:hover { background: #1f5a32; }

    #quest-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .quest-card {
      background: #131313;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 0.7rem 0.85rem;
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }
    .quest-card:hover { border-color: #333; background: #161616; }
    .quest-card.done { opacity: 0.5; }
    .quest-card.done .quest-title { text-decoration: line-through; color: #666; }

    .quest-check {
      width: 18px; height: 18px;
      border: 2px solid #444;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: border-color 0.12s, background 0.12s;
      cursor: pointer;
    }
    .quest-check:hover { border-color: #2a6; }
    .quest-card.done .quest-check {
      background: #2a6;
      border-color: #2a6;
      color: #fff;
      font-size: 0.7rem;
    }

    .quest-body { flex: 1; min-width: 0; }
    .quest-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #eee;
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .quest-desc {
      font-size: 0.78rem;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .quest-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.3rem;
      flex-wrap: wrap;
    }
    .quest-xp {
      font-size: 0.72rem;
      font-weight: 700;
      color: #f80;
      background: rgba(255,136,0,0.1);
      border: 1px solid rgba(255,136,0,0.25);
      border-radius: 4px;
      padding: 1px 6px;
    }
    .quest-type-badge {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .badge-daily   { color: #4cf; background: rgba(68,204,255,0.1); border: 1px solid rgba(68,204,255,0.25); }
    .badge-story   { color: #c8f; background: rgba(200,136,255,0.1); border: 1px solid rgba(200,136,255,0.25); }
    .badge-side    { color: #fa4; background: rgba(255,170,68,0.1); border: 1px solid rgba(255,170,68,0.25); }
    .badge-personal{ color: #4d9; background: rgba(68,204,136,0.1); border: 1px solid rgba(68,204,136,0.25); }

    .quest-due {
      font-size: 0.72rem;
      color: #666;
    }
    .quest-due.overdue { color: #e44; }

    .quest-delete {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.1rem 0.2rem;
      border-radius: 4px;
      flex-shrink: 0;
      transition: color 0.12s;
    }
    .quest-delete:hover { color: #e44; }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 0.75rem;
      color: #444;
      text-align: center;
      padding: 2rem;
    }
    .empty-state .empty-icon { font-size: 3rem; }
    .empty-state p { font-size: 0.9rem; }

    /* ── Add/Edit Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 8000;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.5rem;
      width: min(480px, 95vw);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .modal h2 { font-size: 1.1rem; color: #fff; }
    .modal label { font-size: 0.8rem; color: #888; display: block; margin-bottom: 0.25rem; }
    .modal input, .modal textarea, .modal select {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 0.45rem 0.7rem;
      font-size: 0.88rem;
      font-family: inherit;
      outline: none;
    }
    .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: #2a6; }
    .modal textarea { resize: vertical; min-height: 70px; }
    .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
    .btn-cancel {
      background: transparent;
      border: 1px solid #333;
      color: #888;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.88rem;
    }
    .btn-save {
      background: #1a4a2a;
      border: 1px solid #2a6;
      color: #4d9;
      padding: 0.4rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
    }
    .btn-cancel:hover { border-color: #555; color: #ccc; }
    .btn-save:hover { background: #1f5a32; }
  </style>
</head>
<body>
<script src="/shared/shell.js" data-active="quests"></script>
<div id="quests-app">

  <!-- Sidebar -->
  <nav id="quest-sidebar">
    <h2>Categories</h2>
    <div class="q-cat active" data-filter="all" onclick="setFilter('all')">
      <span class="q-cat-dot" style="background:#aaa;"></span>
      All Quests
      <span class="q-cat-count" id="cnt-all">0</span>
    </div>
    <div class="q-cat" data-filter="daily" onclick="setFilter('daily')">
      <span class="q-cat-dot" style="background:#4cf;"></span>
      Daily
      <span class="q-cat-count" id="cnt-daily">0</span>
    </div>
    <div class="q-cat" data-filter="story" onclick="setFilter('story')">
      <span class="q-cat-dot" style="background:#c8f;"></span>
      Story
      <span class="q-cat-count" id="cnt-story">0</span>
    </div>
    <div class="q-cat" data-filter="side" onclick="setFilter('side')">
      <span class="q-cat-dot" style="background:#fa4;"></span>
      Side
      <span class="q-cat-count" id="cnt-side">0</span>
    </div>
    <div class="q-cat" data-filter="personal" onclick="setFilter('personal')">
      <span class="q-cat-dot" style="background:#4d9;"></span>
      Personal
      <span class="q-cat-count" id="cnt-personal">0</span>
    </div>
    <div class="q-cat" data-filter="done" onclick="setFilter('done')">
      <span class="q-cat-dot" style="background:#555;"></span>
      Completed
      <span class="q-cat-count" id="cnt-done">0</span>
    </div>
  </nav>

  <!-- Main panel -->
  <div id="quest-main">
    <div id="quest-header">
      <h1 id="quest-heading">All Quests</h1>
      <input id="quest-search" type="text" placeholder="Search quests…" oninput="renderList()">
      <button id="add-quest-btn" onclick="openModal()">+ Add Quest</button>
    </div>
    <div id="quest-list"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-backdrop" id="quest-modal">
  <div class="modal">
    <h2 id="modal-title">New Quest</h2>
    <div>
      <label>Title *</label>
      <input id="q-title" type="text" placeholder="What needs to be done?">
    </div>
    <div>
      <label>Description</label>
      <textarea id="q-desc" placeholder="Details, steps, notes…"></textarea>
    </div>
    <div class="modal-row">
      <div>
        <label>Type</label>
        <select id="q-type">
          <option value="personal">Personal</option>
          <option value="daily">Daily</option>
          <option value="story">Story</option>
          <option value="side">Side</option>
        </select>
      </div>
      <div>
        <label>XP Reward</label>
        <input id="q-xp" type="number" min="0" step="10" placeholder="e.g. 50" value="25">
      </div>
    </div>
    <div>
      <label>Due Date (optional)</label>
      <input id="q-due" type="date">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveQuest()">Save Quest</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'hos_quests_v1';
let quests = [];
let currentFilter = 'all';
let editingId = null;

function load() {
  try { quests = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e) { quests = []; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(quests));
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.q-cat').forEach(el => el.classList.toggle('active', el.dataset.filter === f));
  const labels = { all:'All Quests', daily:'Daily Quests', story:'Story Quests',
    side:'Side Quests', personal:'Personal Quests', done:'Completed' };
  document.getElementById('quest-heading').textContent = labels[f] || 'Quests';
  renderList();
}

function renderList() {
  const search = (document.getElementById('quest-search').value || '').toLowerCase();
  const list = document.getElementById('quest-list');

  // Update counts
  const counts = { all:0, daily:0, story:0, side:0, personal:0, done:0 };
  quests.forEach(q => {
    if (!q.done) { counts.all++; counts[q.type] = (counts[q.type] || 0) + 1; }
    else counts.done++;
  });
  Object.keys(counts).forEach(k => {
    const el = document.getElementById('cnt-' + k);
    if (el) el.textContent = counts[k];
  });

  let visible = quests.filter(q => {
    if (currentFilter === 'done')  return q.done;
    if (currentFilter !== 'all')   return !q.done && q.type === currentFilter;
    return !q.done;
  });
  if (search) {
    visible = visible.filter(q =>
      q.title.toLowerCase().includes(search) ||
      (q.desc || '').toLowerCase().includes(search)
    );
  }

  if (!visible.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>
      <p>${search ? 'No quests match your search.' : currentFilter === 'done' ? 'No completed quests yet.' : 'No quests here yet.'}</p>
      ${!search && currentFilter !== 'done' ? '<button class="btn-save" onclick="openModal()" style="margin-top:0.5rem;">+ Add Your First Quest</button>' : ''}</div>`;
    return;
  }

  const today = new Date().toISOString().slice(0, 10);
  list.innerHTML = visible.map(q => {
    const overdue = q.due && q.due < today && !q.done;
    const badgeClass = 'badge-' + q.type;
    return `<div class="quest-card${q.done ? ' done' : ''}" onclick="openModal('${q.id}')">
      <div class="quest-check" onclick="event.stopPropagation();toggleDone('${q.id}')">${q.done ? '✓' : ''}</div>
      <div class="quest-body">
        <div class="quest-title">${esc(q.title)}</div>
        ${q.desc ? `<div class="quest-desc">${esc(q.desc)}</div>` : ''}
        <div class="quest-meta">
          <span class="quest-xp">⭐ ${q.xp || 0} XP</span>
          <span class="quest-type-badge ${badgeClass}">${q.type}</span>
          ${q.due ? `<span class="quest-due${overdue ? ' overdue' : ''}">${overdue ? '⚠ ' : ''}${q.due}</span>` : ''}
        </div>
      </div>
      <button class="quest-delete" onclick="event.stopPropagation();deleteQuest('${q.id}')" title="Delete">✕</button>
    </div>`;
  }).join('');
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleDone(id) {
  const q = quests.find(x => x.id === id);
  if (q) { q.done = !q.done; save(); renderList(); }
}

function deleteQuest(id) {
  quests = quests.filter(x => x.id !== id);
  save(); renderList();
}

function openModal(id) {
  editingId = id || null;
  const q = id ? quests.find(x => x.id === id) : null;
  document.getElementById('modal-title').textContent = q ? 'Edit Quest' : 'New Quest';
  document.getElementById('q-title').value = q ? q.title : '';
  document.getElementById('q-desc').value  = q ? (q.desc || '') : '';
  document.getElementById('q-type').value  = q ? q.type : 'personal';
  document.getElementById('q-xp').value    = q ? (q.xp || 25) : 25;
  document.getElementById('q-due').value   = q ? (q.due || '') : '';
  document.getElementById('quest-modal').classList.add('open');
  setTimeout(() => document.getElementById('q-title').focus(), 50);
}

function closeModal() {
  document.getElementById('quest-modal').classList.remove('open');
  editingId = null;
}

function saveQuest() {
  const title = document.getElementById('q-title').value.trim();
  if (!title) { document.getElementById('q-title').focus(); return; }
  if (editingId) {
    const q = quests.find(x => x.id === editingId);
    if (q) {
      q.title = title;
      q.desc  = document.getElementById('q-desc').value.trim();
      q.type  = document.getElementById('q-type').value;
      q.xp    = parseInt(document.getElementById('q-xp').value) || 0;
      q.due   = document.getElementById('q-due').value || null;
    }
  } else {
    quests.unshift({
      id:    uid(),
      title: title,
      desc:  document.getElementById('q-desc').value.trim(),
      type:  document.getElementById('q-type').value,
      xp:    parseInt(document.getElementById('q-xp').value) || 0,
      due:   document.getElementById('q-due').value || null,
      done:  false,
      created: new Date().toISOString()
    });
  }
  save(); closeModal(); renderList();
}

// Close modal on backdrop click
document.getElementById('quest-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') saveQuest();
});

load();
renderList();
</script>
</body>
</html>
