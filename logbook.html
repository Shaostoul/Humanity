<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logbook — HumanityOS</title>
  <link rel="stylesheet" href="/shared/theme.css">
  <style>


    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #logbook-app {
      display: flex;
      flex: 1;
      height: calc(100vh - 42px);
      overflow: hidden;
    }

    /* ── Sidebar: entry list ── */
    #log-sidebar {
      width: 240px;
      min-width: 200px;
      background: #111;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    #log-sidebar-header {
      padding: 0.7rem 0.8rem;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    #log-sidebar-header h2 {
      font-size: 0.95rem;
      font-weight: 700;
      color: #eee;
    }
    #log-search {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 0.3rem 0.6rem;
      font-size: 0.83rem;
      width: 100%;
      outline: none;
    }
    #log-search:focus { border-color: #2a6; }
    #new-entry-btn {
      background: #1a4a2a;
      border: 1px solid #2a6;
      color: #4d9;
      padding: 0.35rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.83rem;
      font-weight: 600;
      width: 100%;
      transition: background 0.12s;
    }
    #new-entry-btn:hover { background: #1f5a32; }

    #log-entry-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.4rem;
    }
    .log-entry-item {
      padding: 0.55rem 0.65rem;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 0.2rem;
      border: 1px solid transparent;
      transition: background 0.1s;
    }
    .log-entry-item:hover { background: #1a1a1a; }
    .log-entry-item.active {
      background: #141414;
      border-color: #2a6;
    }
    .log-entry-item .log-item-date {
      font-size: 0.72rem;
      color: #555;
      margin-bottom: 0.2rem;
    }
    .log-entry-item .log-item-title {
      font-size: 0.84rem;
      font-weight: 600;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .log-entry-item .log-item-preview {
      font-size: 0.75rem;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 0.15rem;
    }
    .log-tag {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 3px;
      margin-right: 3px;
      margin-top: 3px;
    }

    /* ── Main editor ── */
    #log-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0f0f0f;
    }
    #log-editor-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.9rem;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
    #log-entry-title-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      outline: none;
      font-family: inherit;
    }
    #log-entry-title-input::placeholder { color: #444; }
    #log-date-display {
      font-size: 0.78rem;
      color: #555;
      white-space: nowrap;
    }
    #log-tag-input {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      color: #aaa;
      padding: 0.2rem 0.5rem;
      font-size: 0.75rem;
      width: 130px;
      outline: none;
    }
    #log-tag-input:focus { border-color: #2a6; }
    #log-delete-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: #555;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: color 0.12s, border-color 0.12s;
    }
    #log-delete-btn:hover { color: #e44; border-color: #e44; }
    #log-save-indicator {
      font-size: 0.72rem;
      color: #4d9;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #log-save-indicator.visible { opacity: 1; }

    #log-textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: #d8d8d8;
      font-size: 0.95rem;
      line-height: 1.7;
      padding: 1.2rem 1.5rem;
      resize: none;
      outline: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow-y: auto;
    }
    #log-textarea::placeholder { color: #333; }

    /* Word count bar */
    #log-footer-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.35rem 1rem;
      border-top: 1px solid #1a1a1a;
      flex-shrink: 0;
      background: #0d0d0d;
    }
    #log-footer-bar span { font-size: 0.72rem; color: #444; }

    /* Empty / welcome state */
    #log-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 0.75rem;
      color: #444;
      text-align: center;
      padding: 2rem;
    }
    #log-empty .empty-icon { font-size: 3rem; }
    #log-empty p { font-size: 0.92rem; }
  </style>
</head>
<body>
<script src="/shared/shell.js" data-active="logbook"></script>
<div id="logbook-app">

  <!-- Sidebar -->
  <nav id="log-sidebar">
    <div id="log-sidebar-header">
      <h2>📔 Logbook</h2>
      <input id="log-search" type="text" placeholder="Search entries…" oninput="renderSidebar()">
      <button id="new-entry-btn" onclick="newEntry()">+ New Entry</button>
    </div>
    <div id="log-entry-list"></div>
  </nav>

  <!-- Editor -->
  <div id="log-main">
    <div id="log-editor-bar">
      <input id="log-entry-title-input" type="text" placeholder="Entry title…" oninput="onTitleInput()" style="display:none;">
      <span id="log-date-display"></span>
      <input id="log-tag-input" type="text" placeholder="Tags (comma-separated)" oninput="onTagInput()" style="display:none;">
      <button id="log-delete-btn" onclick="deleteCurrentEntry()" style="display:none;">🗑 Delete</button>
      <span id="log-save-indicator">✓ Saved</span>
    </div>
    <div id="log-empty">
      <div class="empty-icon">📔</div>
      <p>Your personal logbook.<br>Record thoughts, discoveries, and daily reflections.</p>
      <button class="btn-new" onclick="newEntry()"
        style="background:#1a4a2a;border:1px solid #2a6;color:#4d9;padding:0.4rem 1rem;border-radius:6px;cursor:pointer;font-size:0.88rem;font-weight:600;margin-top:0.5rem;">
        + Write First Entry
      </button>
    </div>
    <textarea id="log-textarea" placeholder="Start writing…" oninput="onTextInput()" style="display:none;"></textarea>
    <div id="log-footer-bar" style="display:none;">
      <span id="wc-words">0 words</span>
      <span id="wc-chars">0 chars</span>
      <span id="wc-lines">0 lines</span>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'hos_logbook_v1';
let entries = [];
let activeId = null;
let saveTimer = null;

const TAG_COLORS = ['#4cf','#c8f','#4d9','#fa4','#f46','#0cf'];

function load() {
  try { entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e) { entries = []; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  const ind = document.getElementById('log-save-indicator');
  ind.classList.add('visible');
  setTimeout(() => ind.classList.remove('visible'), 1500);
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function newEntry() {
  const now = new Date();
  const e = {
    id: uid(),
    title: 'Entry — ' + now.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}),
    body: '',
    tags: [],
    created: now.toISOString(),
    updated: now.toISOString()
  };
  entries.unshift(e);
  save();
  renderSidebar();
  openEntry(e.id);
}

function openEntry(id) {
  activeId = id;
  const e = entries.find(x => x.id === id);
  if (!e) return;

  document.getElementById('log-empty').style.display = 'none';
  document.getElementById('log-textarea').style.display = 'block';
  document.getElementById('log-footer-bar').style.display = 'flex';
  document.getElementById('log-entry-title-input').style.display = 'block';
  document.getElementById('log-tag-input').style.display = 'block';
  document.getElementById('log-delete-btn').style.display = 'block';

  document.getElementById('log-entry-title-input').value = e.title;
  document.getElementById('log-textarea').value = e.body;
  document.getElementById('log-tag-input').value = (e.tags || []).join(', ');
  document.getElementById('log-date-display').textContent = new Date(e.created).toLocaleString('en-US', {
    month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit'
  });

  updateWordCount();
  renderSidebar();
  document.getElementById('log-textarea').focus();
}

function deleteCurrentEntry() {
  if (!activeId) return;
  if (!confirm('Delete this entry? This cannot be undone.')) return;
  entries = entries.filter(x => x.id !== activeId);
  activeId = null;
  save();

  // Show empty or open next
  if (entries.length) {
    openEntry(entries[0].id);
  } else {
    document.getElementById('log-empty').style.display = 'flex';
    document.getElementById('log-textarea').style.display = 'none';
    document.getElementById('log-footer-bar').style.display = 'none';
    document.getElementById('log-entry-title-input').style.display = 'none';
    document.getElementById('log-tag-input').style.display = 'none';
    document.getElementById('log-delete-btn').style.display = 'none';
    document.getElementById('log-entry-title-input').value = '';
    document.getElementById('log-textarea').value = '';
    document.getElementById('log-date-display').textContent = '';
    renderSidebar();
  }
}

function onTitleInput() {
  const e = entries.find(x => x.id === activeId);
  if (!e) return;
  e.title = document.getElementById('log-entry-title-input').value;
  e.updated = new Date().toISOString();
  scheduleSave();
  renderSidebar();
}

function onTextInput() {
  const e = entries.find(x => x.id === activeId);
  if (!e) return;
  e.body = document.getElementById('log-textarea').value;
  e.updated = new Date().toISOString();
  updateWordCount();
  scheduleSave();
  renderSidebar();
}

function onTagInput() {
  const e = entries.find(x => x.id === activeId);
  if (!e) return;
  e.tags = document.getElementById('log-tag-input').value
    .split(',').map(t => t.trim()).filter(Boolean);
  scheduleSave();
  renderSidebar();
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(save, 800);
}

function updateWordCount() {
  const txt = document.getElementById('log-textarea').value;
  const words = txt.trim() ? txt.trim().split(/\s+/).length : 0;
  const chars = txt.length;
  const lines = txt ? txt.split('\n').length : 0;
  document.getElementById('wc-words').textContent = words + ' word' + (words !== 1 ? 's' : '');
  document.getElementById('wc-chars').textContent = chars + ' char' + (chars !== 1 ? 's' : '');
  document.getElementById('wc-lines').textContent = lines + ' line' + (lines !== 1 ? 's' : '');
}

function tagColor(tag) {
  let h = 0;
  for (let i = 0; i < tag.length; i++) h = (h * 31 + tag.charCodeAt(i)) | 0;
  return TAG_COLORS[Math.abs(h) % TAG_COLORS.length];
}

function renderSidebar() {
  const search = (document.getElementById('log-search').value || '').toLowerCase();
  let visible = entries;
  if (search) {
    visible = entries.filter(e =>
      e.title.toLowerCase().includes(search) ||
      (e.body || '').toLowerCase().includes(search) ||
      (e.tags || []).some(t => t.toLowerCase().includes(search))
    );
  }
  const list = document.getElementById('log-entry-list');
  if (!visible.length) {
    list.innerHTML = '<div style="color:#444;font-size:0.8rem;text-align:center;padding:1.5rem 0.5rem;">' +
      (search ? 'No entries match your search.' : 'No entries yet.') + '</div>';
    return;
  }
  list.innerHTML = visible.map(e => {
    const isActive = e.id === activeId;
    const preview = (e.body || '').replace(/\n/g, ' ').trim().slice(0, 60);
    const tags = (e.tags || []).slice(0, 3).map(t =>
      `<span class="log-tag" style="background:${tagColor(t)}22;color:${tagColor(t)};border:1px solid ${tagColor(t)}44;">${esc(t)}</span>`
    ).join('');
    return `<div class="log-entry-item${isActive ? ' active' : ''}" onclick="openEntry('${e.id}')">
      <div class="log-item-date">${new Date(e.created).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
      <div class="log-item-title">${esc(e.title)}</div>
      ${preview ? `<div class="log-item-preview">${esc(preview)}</div>` : ''}
      ${tags ? `<div style="margin-top:3px;">${tags}</div>` : ''}
    </div>`;
  }).join('');
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); newEntry(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); save(); }
});

load();
renderSidebar();
if (entries.length) openEntry(entries[0].id);
</script>
</body>
</html>
