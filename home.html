<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home — HumanityOS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #home-app {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Home switcher tabs ── */
    .home-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .home-tab {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.45rem 1rem;
      border-radius: 8px;
      border: 1px solid #222;
      background: #111;
      color: #888;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .home-tab:hover { background: #181818; border-color: #333; color: #ccc; }
    .home-tab.active { background: #1a1a1a; border-color: #FF8811; color: #fff; }
    .home-tab .tab-emoji { font-size: 1rem; }

    /* ── Home header card ── */
    .home-card {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #1e1e1e;
      background: #111;
    }

    .home-cover {
      height: 120px;
      background: linear-gradient(135deg, #1a2e1a 0%, #0d1a0d 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }
    .home-cover[data-type="fleet"] {
      background: linear-gradient(135deg, #0d1a2e 0%, #070d1a 100%);
    }
    .home-cover[data-type="real"] {
      background: linear-gradient(135deg, #2e1a0d 0%, #1a0d07 100%);
    }
    .home-cover img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.6;
    }
    .home-cover-emoji {
      position: absolute;
      right: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 4rem;
      opacity: 0.15;
      pointer-events: none;
      user-select: none;
    }
    .home-cover-edit {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      background: rgba(0,0,0,0.55);
      border: 1px solid #333;
      border-radius: 5px;
      color: #888;
      font-size: 0.7rem;
      padding: 0.25rem 0.5rem;
      cursor: pointer;
      transition: all 0.12s;
      z-index: 2;
    }
    .home-cover-edit:hover { color: #fff; background: rgba(0,0,0,0.8); }

    .home-meta {
      padding: 1rem 1.25rem 1.1rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .home-emoji-badge {
      font-size: 2.2rem;
      flex-shrink: 0;
      line-height: 1;
      margin-top: 0.1rem;
    }

    .home-info { flex: 1; min-width: 0; }

    .home-name-row {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .home-name {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .home-type-badge {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
    }
    .badge-earth  { background: #0d2e14; color: #4caf50; }
    .badge-fleet  { background: #0d1a3a; color: #5588dd; }
    .badge-real   { background: #3a1a00; color: #FF8811; }

    .home-subtitle {
      font-size: 0.78rem;
      color: #777;
      margin-top: 0.25rem;
    }

    .home-detail-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 0.55rem;
    }

    .home-detail-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.72rem;
      color: #666;
    }
    .home-detail-item .di-icon { font-size: 0.85rem; }

    /* ── Content grid ── */
    .home-content {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 1.25rem;
      align-items: start;
    }

    /* ── Panel base ── */
    .panel {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 0.9rem 0.55rem;
      border-bottom: 1px solid #1a1a1a;
    }

    .panel-header h3 {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #666;
      flex: 1;
    }

    .panel-add-btn {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 5px;
      color: #888;
      font-size: 0.7rem;
      padding: 0.2rem 0.55rem;
      cursor: pointer;
      transition: all 0.12s;
    }
    .panel-add-btn:hover { background: #252525; color: #fff; border-color: #444; }

    /* ── Room accordion ── */
    .rooms-list { display: flex; flex-direction: column; }

    .room-item {
      border-bottom: 1px solid #181818;
    }
    .room-item:last-child { border-bottom: none; }

    .room-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.9rem;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }
    .room-header:hover { background: #161616; }

    .room-toggle {
      font-size: 0.7rem;
      color: #555;
      transition: transform 0.2s;
      flex-shrink: 0;
      width: 14px;
    }
    .room-toggle.open { transform: rotate(90deg); }

    .room-name {
      font-size: 0.85rem;
      font-weight: 600;
      flex: 1;
    }

    .room-count {
      font-size: 0.65rem;
      color: #555;
      background: #1e1e1e;
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
    }

    .room-actions {
      display: flex;
      gap: 0.3rem;
    }

    .room-action-btn {
      background: none;
      border: none;
      color: #444;
      font-size: 0.75rem;
      cursor: pointer;
      padding: 0.1rem 0.25rem;
      border-radius: 3px;
      transition: color 0.12s, background 0.12s;
    }
    .room-action-btn:hover { color: #aaa; background: #1e1e1e; }
    .room-action-btn.del:hover { color: #e74c3c; }

    .room-body {
      display: none;
      padding: 0 0.9rem 0.75rem;
    }
    .room-body.open { display: block; }

    .room-notes-area {
      width: 100%;
      background: #141414;
      border: 1px solid #222;
      border-radius: 5px;
      color: #ccc;
      font-size: 0.75rem;
      padding: 0.4rem 0.6rem;
      resize: none;
      min-height: 52px;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      margin-bottom: 0.6rem;
      margin-top: 0.1rem;
    }
    .room-notes-area:focus { border-color: #333; }
    .room-notes-area::placeholder { color: #444; }

    /* ── Item list ── */
    .item-list { display: flex; flex-direction: column; gap: 0.25rem; }

    .item-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.25rem 0.4rem;
      border-radius: 5px;
      background: #141414;
      font-size: 0.78rem;
    }

    .item-icon { font-size: 0.9rem; flex-shrink: 0; }

    .item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .item-qty {
      font-size: 0.65rem;
      color: #666;
      background: #1e1e1e;
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      white-space: nowrap;
    }

    .item-del {
      background: none;
      border: none;
      color: #333;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0 0.2rem;
      line-height: 1;
      transition: color 0.12s;
    }
    .item-del:hover { color: #e74c3c; }

    .item-add-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.4rem;
      background: none;
      border: 1px dashed #222;
      border-radius: 5px;
      color: #555;
      font-size: 0.72rem;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      width: 100%;
      transition: all 0.12s;
    }
    .item-add-btn:hover { border-color: #444; color: #aaa; background: #141414; }

    /* ── Home inventory panel ── */
    .inv-panel-body {
      padding: 0.75rem 0.9rem;
      min-height: 80px;
    }

    /* ── Notes panel ── */
    .notes-panel-body { padding: 0.75rem 0.9rem; }
    .home-notes-area {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 5px;
      color: #e0e0e0;
      font-size: 0.8rem;
      padding: 0.5rem 0.6rem;
      resize: none;
      min-height: 100px;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
    }
    .home-notes-area:focus { border-color: #444; }

    /* ── Empty states ── */
    .empty-msg {
      font-size: 0.75rem;
      color: #555;
      padding: 0.4rem 0.9rem 0.75rem;
      font-style: italic;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .home-content { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<script src="/shared/shell.js" data-active="home"></script>
<div id="home-app">

  <!-- Home switcher tabs -->
  <div class="home-tabs" id="home-tabs"></div>

  <!-- Active home header card -->
  <div class="home-card" id="home-card">
    <div class="home-cover" id="home-cover">
      <span class="home-cover-emoji" id="home-cover-emoji"></span>
      <button class="home-cover-edit" id="home-cover-edit-btn" onclick="editCoverImage()">📷 Cover</button>
    </div>
    <div class="home-meta">
      <div class="home-emoji-badge" id="home-emoji-badge"></div>
      <div class="home-info">
        <div class="home-name-row">
          <span class="home-name" id="home-name"></span>
          <span class="home-type-badge" id="home-type-badge"></span>
        </div>
        <div class="home-subtitle" id="home-subtitle"></div>
        <div class="home-detail-row" id="home-detail-row"></div>
      </div>
    </div>
  </div>

  <!-- Rooms + Inventory -->
  <div class="home-content">

    <!-- Left: Rooms -->
    <div class="panel">
      <div class="panel-header">
        <h3>🏠 Rooms &amp; Areas</h3>
        <button class="panel-add-btn" onclick="addRoom()">+ Add Room</button>
      </div>
      <div class="rooms-list" id="rooms-list"></div>
      <div class="empty-msg" id="rooms-empty" style="display:none">No rooms yet. Add your first room above.</div>
    </div>

    <!-- Right: Home Inventory -->
    <div class="panel">
      <div class="panel-header">
        <h3>📦 Home Inventory</h3>
        <button class="panel-add-btn" onclick="addHomeItem()">+ Add Item</button>
      </div>
      <div class="inv-panel-body" id="home-inv-list"></div>
    </div>

  </div>

  <!-- Notes / Planning -->
  <div class="panel">
    <div class="panel-header">
      <h3>📝 Notes &amp; Planning</h3>
    </div>
    <div class="notes-panel-body">
      <textarea class="home-notes-area" id="home-notes-area"
        placeholder="Add notes, plans, wish-list items…"
        oninput="scheduleNoteSave()"></textarea>
    </div>
  </div>

</div>

<script>
// ────────────────────────────────────────────────
// Data model — localStorage key: hos_homes_v2
// ────────────────────────────────────────────────

const HOMES_KEY = 'hos_homes_v2';

/** Default home data seeded on first visit */
const DEFAULT_HOMES = [
  {
    id: 'earth-paradise',
    name: 'Paradise Resort',
    subtitle: 'Mount Rainier National Park, WA 98304, USA',
    type: 'earth',
    emoji: '🏔️',
    imageUrl: '',
    climate: 'Alpine / Subalpine',
    coords: { lat: 46.7862, lng: -121.7353 },
    rooms: [
      { id: 'r1', name: 'Common Area', notes: '', items: [] },
      { id: 'r2', name: 'Private Quarters', notes: '', items: [] }
    ],
    inventory: [],
    notes: ''
  },
  {
    id: 'fleet-quarters',
    name: 'Fleet Quarters',
    subtitle: 'Aboard the Fleet',
    type: 'fleet',
    emoji: '🚀',
    imageUrl: '',
    climate: 'Controlled Environment',
    coords: null,
    rooms: [
      { id: 'r1', name: 'Main Room', notes: '', items: [] },
      { id: 'r2', name: 'Storage Bay', notes: '', items: [] }
    ],
    inventory: [],
    notes: ''
  },
  {
    id: 'silverdale-real',
    name: 'Silverdale Home',
    subtitle: 'Silverdale, Washington 98383, USA',
    type: 'real',
    emoji: '🏡',
    imageUrl: '',
    climate: 'Oceanic / Maritime',
    coords: { lat: 47.6476, lng: -122.6942 },
    rooms: [],
    inventory: [],
    notes: 'Planning area — add rooms, wish-list items, and build notes here.'
  }
];

// ── State ──
let homes = [];
let activeHomeId = '';
let openRooms = new Set(); // room IDs expanded in the accordion
let noteTimer = null;

// ────────────────────────────────────────────────
// Persistence helpers
// ────────────────────────────────────────────────

/** Load homes from localStorage; seed defaults if missing */
function loadHomes() {
  try {
    const raw = localStorage.getItem(HOMES_KEY);
    if (raw) {
      homes = JSON.parse(raw);
    } else {
      homes = JSON.parse(JSON.stringify(DEFAULT_HOMES)); // deep copy
      saveHomes();
    }
  } catch(e) {
    homes = JSON.parse(JSON.stringify(DEFAULT_HOMES));
    saveHomes();
  }

  // Restore last active home or default to first
  const savedActive = localStorage.getItem('hos_active_home') || '';
  activeHomeId = homes.find(h => h.id === savedActive) ? savedActive : (homes[0]?.id || '');
}

/** Write homes array to localStorage */
function saveHomes() {
  localStorage.setItem(HOMES_KEY, JSON.stringify(homes));
}

/** Get currently active home object */
function activeHome() {
  return homes.find(h => h.id === activeHomeId) || homes[0];
}

// ────────────────────────────────────────────────
// Navigation — switch active home tab
// ────────────────────────────────────────────────

/** Switch active home, persist choice, re-render */
function switchHome(id) {
  activeHomeId = id;
  localStorage.setItem('hos_active_home', id);
  openRooms.clear();
  renderTabs();
  renderHome(activeHome());
}

// ────────────────────────────────────────────────
// Rendering
// ────────────────────────────────────────────────

/** Render the tab strip */
function renderTabs() {
  const container = document.getElementById('home-tabs');
  container.innerHTML = homes.map(h => `
    <div class="home-tab${h.id === activeHomeId ? ' active' : ''}"
         onclick="switchHome('${esc(h.id)}')">
      <span class="tab-emoji">${h.emoji}</span>
      <span>${esc(h.name)}</span>
    </div>
  `).join('');
}

/** Render the full home view (header + rooms + inventory + notes) */
function renderHome(home) {
  if (!home) return;

  // ── Cover ──
  const cover = document.getElementById('home-cover');
  cover.setAttribute('data-type', home.type);
  cover.innerHTML = '';

  if (home.imageUrl) {
    const img = document.createElement('img');
    img.src = home.imageUrl;
    img.alt = 'Cover';
    cover.appendChild(img);
  }
  const emojiOverlay = document.createElement('span');
  emojiOverlay.className = 'home-cover-emoji';
  emojiOverlay.textContent = home.emoji;
  cover.appendChild(emojiOverlay);

  const editBtn = document.createElement('button');
  editBtn.className = 'home-cover-edit';
  editBtn.textContent = '📷 Cover';
  editBtn.onclick = editCoverImage;
  cover.appendChild(editBtn);

  // ── Meta ──
  document.getElementById('home-emoji-badge').textContent = home.emoji;
  document.getElementById('home-name').textContent = home.name;

  const badge = document.getElementById('home-type-badge');
  const badgeLabels = { earth: '🌍 Earth', fleet: '🚀 Fleet', real: '🏡 Real World' };
  badge.textContent = badgeLabels[home.type] || home.type;
  badge.className = 'home-type-badge badge-' + home.type;

  document.getElementById('home-subtitle').textContent = home.subtitle;

  const detailRow = document.getElementById('home-detail-row');
  const details = [];
  if (home.climate)  details.push(`<div class="home-detail-item"><span class="di-icon">🌡️</span>${esc(home.climate)}</div>`);
  if (home.coords)   details.push(`<div class="home-detail-item"><span class="di-icon">📍</span>${home.coords.lat.toFixed(4)}°N ${Math.abs(home.coords.lng).toFixed(4)}°W</div>`);
  details.push(`<div class="home-detail-item" id="home-weather"><span class="di-icon">🌤</span><span id="weather-text">—</span></div>`);
  detailRow.innerHTML = details.join('');

  // Fetch live weather from Open-Meteo (free, no key) if coords available.
  if (home.coords) fetchWeather(home.coords.lat, home.coords.lng);
  else document.getElementById('weather-text') && (document.getElementById('weather-text').textContent = 'No coordinates');

  // ── Rooms ──
  renderRooms(home);

  // ── Inventory ──
  renderHomeInventory(home);

  // ── Notes ──
  document.getElementById('home-notes-area').value = home.notes || '';
}

/** Render the rooms accordion for a home */
function renderRooms(home) {
  const list = document.getElementById('rooms-list');
  const empty = document.getElementById('rooms-empty');

  if (!home.rooms || home.rooms.length === 0) {
    list.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = home.rooms.map(room => {
    const isOpen = openRooms.has(room.id);
    const itemCount = (room.items || []).length;
    return `
      <div class="room-item" id="room-${esc(room.id)}">
        <div class="room-header" onclick="toggleRoom('${esc(room.id)}')">
          <span class="room-toggle${isOpen ? ' open' : ''}">▶</span>
          <span class="room-name">${esc(room.name)}</span>
          ${itemCount > 0 ? `<span class="room-count">${itemCount} item${itemCount !== 1 ? 's' : ''}</span>` : ''}
          <div class="room-actions" onclick="event.stopPropagation()">
            <button class="room-action-btn" title="Rename room" onclick="renameRoom('${esc(home.id)}','${esc(room.id)}')">✏️</button>
            <button class="room-action-btn del" title="Delete room" onclick="deleteRoom('${esc(home.id)}','${esc(room.id)}')">🗑️</button>
          </div>
        </div>
        <div class="room-body${isOpen ? ' open' : ''}">
          <textarea class="room-notes-area"
            placeholder="Room notes…"
            data-home="${esc(home.id)}"
            data-room="${esc(room.id)}"
            oninput="scheduleRoomNoteSave(this)"
          >${esc(room.notes || '')}</textarea>
          <div class="item-list" id="items-${esc(room.id)}">
            ${renderItemRows(home.id, room.id, room.items || [])}
          </div>
          <button class="item-add-btn" onclick="addRoomItem('${esc(home.id)}','${esc(room.id)}')">
            + Add Item to ${esc(room.name)}
          </button>
        </div>
      </div>
    `;
  }).join('');
}

/** Render item rows HTML string for a room or home inventory */
function renderItemRows(homeId, roomId, items) {
  if (!items || items.length === 0) return '';
  return items.map((item, idx) => `
    <div class="item-row">
      <span class="item-icon">${item.icon || '📦'}</span>
      <span class="item-name">${esc(item.name)}</span>
      ${item.qty && item.qty !== '1' ? `<span class="item-qty">×${esc(String(item.qty))}</span>` : ''}
      <button class="item-del" onclick="deleteItem('${esc(homeId)}','${esc(roomId)}',${idx})" title="Remove">×</button>
    </div>
  `).join('');
}

/** Render home-wide (unassigned) inventory */
function renderHomeInventory(home) {
  const container = document.getElementById('home-inv-list');
  const items = home.inventory || [];

  if (items.length === 0) {
    container.innerHTML = `<div style="font-size:.75rem;color:#555;font-style:italic">No items yet.</div>`;
    return;
  }

  container.innerHTML = `<div class="item-list">${renderItemRows(home.id, '__inv__', items)}</div>`;
}

// ────────────────────────────────────────────────
// Room CRUD
// ────────────────────────────────────────────────

function addRoom() {
  const home = activeHome();
  if (!home) return;
  const name = prompt('Room / area name:');
  if (!name || !name.trim()) return;
  const id = 'r' + Date.now().toString(36);
  home.rooms.push({ id, name: name.trim(), notes: '', items: [] });
  saveHomes();
  openRooms.add(id);
  renderRooms(home);
}

function renameRoom(homeId, roomId) {
  const home = homes.find(h => h.id === homeId);
  if (!home) return;
  const room = home.rooms.find(r => r.id === roomId);
  if (!room) return;
  const name = prompt('New room name:', room.name);
  if (!name || !name.trim()) return;
  room.name = name.trim();
  saveHomes();
  renderRooms(home);
}

function deleteRoom(homeId, roomId) {
  const home = homes.find(h => h.id === homeId);
  if (!home) return;
  const room = home.rooms.find(r => r.id === roomId);
  if (!room) return;
  if (!confirm(`Delete room "${room.name}"? This will also remove all items in it.`)) return;
  home.rooms = home.rooms.filter(r => r.id !== roomId);
  openRooms.delete(roomId);
  saveHomes();
  renderRooms(home);
}

function toggleRoom(roomId) {
  if (openRooms.has(roomId)) {
    openRooms.delete(roomId);
  } else {
    openRooms.add(roomId);
  }
  renderRooms(activeHome());
}

// ────────────────────────────────────────────────
// Item CRUD
// ────────────────────────────────────────────────

function addRoomItem(homeId, roomId) {
  const home = homes.find(h => h.id === homeId);
  if (!home) return;
  const room = home.rooms.find(r => r.id === roomId);
  if (!room) return;
  const name = prompt('Item name:');
  if (!name || !name.trim()) return;
  const qty = prompt('Quantity (leave blank for 1):', '1') || '1';
  room.items.push({ name: name.trim(), qty: qty.trim() || '1', icon: '📦' });
  saveHomes();
  openRooms.add(roomId);
  renderRooms(home);
}

function addHomeItem() {
  const home = activeHome();
  if (!home) return;
  const name = prompt('Item name:');
  if (!name || !name.trim()) return;
  const qty = prompt('Quantity (leave blank for 1):', '1') || '1';
  home.inventory.push({ name: name.trim(), qty: qty.trim() || '1', icon: '📦' });
  saveHomes();
  renderHomeInventory(home);
}

/**
 * Delete an item from a room or from home inventory.
 * roomId '__inv__' means home-level inventory.
 */
function deleteItem(homeId, roomId, idx) {
  const home = homes.find(h => h.id === homeId);
  if (!home) return;
  if (roomId === '__inv__') {
    home.inventory.splice(idx, 1);
    saveHomes();
    renderHomeInventory(home);
  } else {
    const room = home.rooms.find(r => r.id === roomId);
    if (!room) return;
    room.items.splice(idx, 1);
    saveHomes();
    renderRooms(home);
  }
}

// ────────────────────────────────────────────────
// Notes auto-save (debounced)
// ────────────────────────────────────────────────

/** Debounced save of the home-level planning notes textarea */
function scheduleNoteSave() {
  clearTimeout(noteTimer);
  noteTimer = setTimeout(() => {
    const home = activeHome();
    if (!home) return;
    home.notes = document.getElementById('home-notes-area').value;
    saveHomes();
  }, 450);
}

/** Debounced save of a room's notes textarea */
function scheduleRoomNoteSave(el) {
  const homeId = el.dataset.home;
  const roomId = el.dataset.room;
  clearTimeout(el._saveTimer);
  el._saveTimer = setTimeout(() => {
    const home = homes.find(h => h.id === homeId);
    if (!home) return;
    const room = home.rooms.find(r => r.id === roomId);
    if (!room) return;
    room.notes = el.value;
    saveHomes();
  }, 450);
}

// ────────────────────────────────────────────────
// Live weather via Open-Meteo (free, no API key)
// ────────────────────────────────────────────────
const WMO_CODE = {
  0:'Clear', 1:'Mainly clear', 2:'Partly cloudy', 3:'Overcast',
  45:'Foggy', 48:'Icy fog',
  51:'Light drizzle', 53:'Drizzle', 55:'Heavy drizzle',
  61:'Light rain', 63:'Rain', 65:'Heavy rain',
  71:'Light snow', 73:'Snow', 75:'Heavy snow', 77:'Snow grains',
  80:'Light showers', 81:'Showers', 82:'Heavy showers',
  85:'Snow showers', 86:'Heavy snow showers',
  95:'Thunderstorm', 96:'T-storm w/hail', 99:'T-storm w/heavy hail',
};
const WMO_ICON = {
  0:'☀️', 1:'🌤', 2:'⛅', 3:'☁️',
  45:'🌫', 48:'🌫',
  51:'🌦', 53:'🌧', 55:'🌧',
  61:'🌧', 63:'🌧', 65:'🌧',
  71:'🌨', 73:'❄️', 75:'❄️', 77:'❄️',
  80:'🌦', 81:'🌧', 82:'⛈',
  85:'🌨', 86:'🌨',
  95:'⛈', 96:'⛈', 99:'⛈',
};

async function fetchWeather(lat, lng) {
  const el = document.getElementById('weather-text');
  if (!el) return;
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lng.toFixed(4)}&current=temperature_2m,weather_code,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const c = data.current;
    if (!c) throw new Error('no data');
    const code = c.weather_code;
    const icon = WMO_ICON[code] || '🌡️';
    const desc = WMO_CODE[code] || 'Unknown';
    el.textContent = `${icon} ${Math.round(c.temperature_2m)}°F — ${desc} · 💨 ${Math.round(c.wind_speed_10m)} mph`;
  } catch(e) {
    if (el) el.textContent = 'Weather unavailable';
  }
}

function editCoverImage() {
  const home = activeHome();
  if (!home) return;
  const url = prompt('Cover image URL (leave blank to clear):', home.imageUrl || '');
  if (url === null) return; // cancelled
  home.imageUrl = url.trim();

  renderHome(home);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
