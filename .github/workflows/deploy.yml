name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy & build on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -e
            export PATH="$HOME/.cargo/bin:$PATH"
            cd /opt/Humanity

            # Pull latest code — reset first so local edits never block CI
            git fetch origin main
            git reset --hard origin/main
            git clean -fd --exclude=backups/ --exclude=data/ --exclude=target/

            # Build relay binary on the server (no binary upload needed)
            cargo build --release --bin humanity-relay

            # Back up current binary
            cp target/release/humanity-relay \
               backups/humanity-relay-$(date +%Y%m%d-%H%M%S) 2>/dev/null || true

            # Sync web assets
            rsync -a --delete \
              /opt/Humanity/crates/humanity-relay/client/ \
              /var/www/humanity/chat/
            rsync -a \
              /opt/Humanity/shared/ \
              /var/www/humanity/shared/

            # Copy all standalone pages from pages/ folder
            for f in /opt/Humanity/pages/*.html; do
              [ -f "$f" ] && cp "$f" "/var/www/humanity/$(basename "$f")"
            done

            # Sync subdirectory pages (game/, etc.)
            for dir in game; do
              if [ -d "/opt/Humanity/$dir" ]; then
                mkdir -p "/var/www/humanity/$dir"
                rsync -a /opt/Humanity/$dir/ /var/www/humanity/$dir/
              fi
            done

            # Graceful restart
            systemctl restart humanity-relay
            sleep 3
            systemctl is-active humanity-relay

      - name: Post deployment announcement
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            SECRET=$(grep '^API_SECRET' /opt/Humanity/.env | cut -d= -f2- | tr -d '\r')
            COMMIT_MSG=$(git -C /opt/Humanity log -1 --pretty=format:"%s")
            COMMIT_SHA=$(git -C /opt/Humanity log -1 --pretty=format:"%h")
            AUTHOR=$(git -C /opt/Humanity log -1 --pretty=format:"%an")
            PAYLOAD="{\"channel\":\"announcements\",\"content\":\"🚀 **Deployed** \`${COMMIT_SHA}\` by ${AUTHOR}: ${COMMIT_MSG}\",\"from_name\":\"Deploy Bot\"}"
            curl -s -X POST "http://localhost:3210/api/send" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${SECRET}" \
              -d "$PAYLOAD" || true
