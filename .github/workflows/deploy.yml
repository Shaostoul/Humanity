name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy & build on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -e
            export PATH="$HOME/.cargo/bin:$PATH"
            cd /opt/Humanity

            # Pull latest code — reset first so local edits never block CI
            git fetch origin main
            git reset --hard origin/main
            git clean -fd --exclude=backups/ --exclude=data/ --exclude=target/

            # ── Disk-pressure guard (incident 2026-05-17) ──
            # Root cause of the prod outage: this on-VPS build cache
            # (target/, kept across deploys for speed) grew unpruned to
            # 27 GB and filled the disk → relay crash-looped silently.
            # Pre-build reclaim: if the cache would risk filling the
            # disk, clear it now. It is regenerable, NOT data — a clean
            # rebuild follows immediately below. `|| true` everywhere so
            # the guard can never block a deploy.
            DISK_PCT=$(df --output=pcent / | tail -1 | tr -dc '0-9' || echo 0)
            echo "Root disk at ${DISK_PCT}% before build"
            if [ "${DISK_PCT:-0}" -ge 80 ]; then
              echo "Disk >= 80% -- clearing regenerable target/ before build"
              rm -rf target || true
            fi
            # Install/refresh the standalone disk-guard timer FROM THE
            # REPO so the protection is version-controlled, self-heals
            # every 20 min, and survives a VPS rebuild (not a manual
            # one-off hack that gets lost).
            chmod +x scripts/humanity-disk-guard.sh || true
            cp -f scripts/systemd/humanity-disk-guard.service /etc/systemd/system/humanity-disk-guard.service || true
            cp -f scripts/systemd/humanity-disk-guard.timer   /etc/systemd/system/humanity-disk-guard.timer   || true
            systemctl daemon-reload || true
            systemctl enable --now humanity-disk-guard.timer || true

            # Build unified binary with relay feature (headless, no GPU deps)
            cargo build --release --features relay --no-default-features

            # Back up current binary
            cp target/release/HumanityOS \
               backups/HumanityOS-$(date +%Y%m%d-%H%M%S) 2>/dev/null || true

            # Sync web assets
            rsync -a --delete \
              /opt/Humanity/web/chat/ \
              /var/www/humanity/chat/
            rsync -a \
              /opt/Humanity/web/shared/ \
              /var/www/humanity/shared/
            rsync -a \
              /opt/Humanity/assets/ \
              /var/www/humanity/assets/

            # Remove orphaned pages from previous deploys
            for old in skills equipment quests logbook vault knowledge systems streams studio learn; do
              rm -f "/var/www/humanity/${old}.html"
            done

            # Copy all standalone pages (HTML + JS) from pages/ folder
            mkdir -p /var/www/humanity/pages
            for f in /opt/Humanity/web/pages/*.html; do
              [ -f "$f" ] && cp "$f" "/var/www/humanity/$(basename "$f")"
            done
            for f in /opt/Humanity/web/pages/*.js; do
              [ -f "$f" ] && cp "$f" "/var/www/humanity/pages/$(basename "$f")"
            done

            # Sync activities and data directories
            for dir in activities; do
              if [ -d "/opt/Humanity/web/$dir" ]; then
                mkdir -p "/var/www/humanity/$dir"
                rsync -a /opt/Humanity/web/$dir/ /var/www/humanity/$dir/
              fi
            done
            mkdir -p /var/www/humanity/data
            rsync -a --include='*.json' --exclude='*' \
              /opt/Humanity/data/ /var/www/humanity/data/

            # Graceful restart
            systemctl restart humanity-relay
            sleep 3
            systemctl is-active humanity-relay

      - name: Post deployment announcement
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            SECRET=$(grep '^API_SECRET' /opt/Humanity/.env | cut -d= -f2- | tr -d '\r')
            COMMIT_MSG=$(git -C /opt/Humanity log -1 --pretty=format:"%s")
            COMMIT_SHA=$(git -C /opt/Humanity log -1 --pretty=format:"%h")
            AUTHOR=$(git -C /opt/Humanity log -1 --pretty=format:"%an")
            PAYLOAD="{\"channel\":\"announcements\",\"content\":\"🚀 **Deployed** \`${COMMIT_SHA}\` by ${AUTHOR}: ${COMMIT_MSG}\",\"from_name\":\"Deploy Bot\"}"
            curl -s -X POST "http://localhost:3210/api/send" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${SECRET}" \
              -d "$PAYLOAD" || true
