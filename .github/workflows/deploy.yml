name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy & build on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -e
            export PATH="$HOME/.cargo/bin:$PATH"
            cd /opt/Humanity

            # Pull latest code
            git pull --ff-only origin main

            # Build relay binary on the server (no binary upload needed)
            cargo build --release --bin humanity-relay

            # Back up current binary
            cp target/release/humanity-relay \
               backups/humanity-relay-$(date +%Y%m%d-%H%M%S) 2>/dev/null || true

            # Sync web assets
            rsync -a --delete \
              /opt/Humanity/crates/humanity-relay/client/ \
              /var/www/humanity/chat/
            rsync -a \
              /opt/Humanity/shared/ \
              /var/www/humanity/shared/

            # Copy standalone pages
            for f in home.html skills.html inventory.html calendar.html quests.html \
                     logbook.html settings.html equipment.html \
                     ops.html tasks.html knowledge.html learn.html market.html systems.html \
                     maps.html streams.html studio.html index.html; do
              [ -f "/opt/Humanity/$f" ] && cp "/opt/Humanity/$f" "/var/www/humanity/$f"
            done

            # Graceful restart
            systemctl restart humanity-relay
            sleep 3
            systemctl is-active humanity-relay

      - name: Post deployment announcement
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            COMMIT_MSG=$(git -C /opt/Humanity log -1 --pretty=format:"%s")
            COMMIT_SHA=$(git -C /opt/Humanity log -1 --pretty=format:"%h")
            AUTHOR=$(git -C /opt/Humanity log -1 --pretty=format:"%an")
            PAYLOAD="{\"channel\":\"announcements\",\"content\":\"🚀 **Deployed** — \`${COMMIT_SHA}\` by ${AUTHOR}: ${COMMIT_MSG}\",\"from_name\":\"Deploy Bot\"}"
            curl -s -X POST "http://localhost:3210/api/send" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${API_SECRET}" \
              -d "$PAYLOAD" || true
        env:
          API_SECRET: ${{ secrets.API_SECRET }}
