name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
            artifact_name: HumanityOS.exe
            asset_name: HumanityOS-windows-x64.exe
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            artifact_name: HumanityOS
            asset_name: HumanityOS-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            artifact_name: HumanityOS
            asset_name: HumanityOS-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
            artifact_name: HumanityOS
            asset_name: HumanityOS-macos-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build native engine (release)
        run: cargo build --release --target ${{ matrix.target }} --features native

      - name: Bundle binary with data
        shell: bash
        run: |
          mkdir -p dist/HumanityOS/assets
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/HumanityOS/${{ matrix.asset_name }}
          # Also stage the raw binary at dist/ root for the in-app updater to grab
          # without needing tar.gz extraction (BUG-034 fix, v0.124.0).
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}
          # DXC shader compiler DLLs (v0.865, Windows only): the exe prefers DXC
          # when dxcompiler.dll + dxil.dll sit beside it (boot ~25 s -> ~5 s;
          # graceful FXC fallback without them). The hosted runner's Windows SDK
          # ships both; bundle the newest. MIT-licensed, redistributable.
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            SDKBIN=$(ls -d "/c/Program Files (x86)/Windows Kits/10/bin/"10.*/x64 2>/dev/null | sort -V | tail -1)
            if [[ -n "$SDKBIN" && -f "$SDKBIN/dxcompiler.dll" && -f "$SDKBIN/dxil.dll" ]]; then
              cp "$SDKBIN/dxcompiler.dll" "$SDKBIN/dxil.dll" dist/HumanityOS/
              echo "Bundled DXC from $SDKBIN"
            else
              echo "WARNING: Windows SDK DXC DLLs not found; bundle will fall back to FXC (slow boot)"
            fi
          fi
          # Copy game data and assets
          cp -r data/ dist/HumanityOS/data/
          cp -r assets/icons/ dist/HumanityOS/assets/icons/
          cp -r assets/shaders/ dist/HumanityOS/assets/shaders/
          # Remove large audio placeholders if they exist
          rm -rf dist/HumanityOS/data/audio/sfx/* dist/HumanityOS/data/audio/music/* dist/HumanityOS/data/audio/ambient/* 2>/dev/null || true
          # Create the bundle archives (binary + data + assets) for fresh installs.
          # BOTH formats: .zip opens natively on every OS (Windows Explorer, macOS
          # Finder, Linux file managers -- the no-friction choice for regular
          # people); .tar.gz stays for scripts/servers and existing tooling.
          # (.rar was considered and rejected: creating RAR requires proprietary
          # software our open CI can't use, and Windows 10 can't open it natively.)
          cd dist && tar czf HumanityOS-${{ matrix.label }}.tar.gz HumanityOS/
          if command -v 7z >/dev/null 2>&1; then
            7z a -tzip HumanityOS-${{ matrix.label }}.zip HumanityOS/ >/dev/null
          else
            zip -qr HumanityOS-${{ matrix.label }}.zip HumanityOS/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: humanity-${{ matrix.label }}
          path: |
            dist/HumanityOS-${{ matrix.label }}.tar.gz
            dist/HumanityOS-${{ matrix.label }}.zip
            dist/${{ matrix.asset_name }}

      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: false
          files: |
            dist/HumanityOS-${{ matrix.label }}.tar.gz
            dist/HumanityOS-${{ matrix.label }}.zip
            dist/${{ matrix.asset_name }}

  # Mirror every platform's binaries to the VPS release archive in one batch
  # and regenerate the manifest. Runs on Linux (required for the container
  # action — appleboy/scp-action is Docker-based and won't execute on macOS
  # or Windows runners). Pulls every platform's artifacts via
  # actions/download-artifact, then uploads as a single payload.
  mirror-to-vps:
    name: Mirror binaries to VPS + regen manifest
    needs: [build, bundle-data]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform + data artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: humanity-*
          merge-multiple: true
        # `humanity-*` matches both per-platform bundles and `humanity-data`,
        # so dist/ ends up with binaries + data archive + data manifest.

      - name: List downloaded files
        run: ls -la dist/ && echo '---' && du -h dist/* | head

      # appleboy/scp-action sometimes returns a false-positive
      # `drone-scp error: dial tcp ...: i/o timeout` AFTER the upload has
      # actually completed (files arrive on the VPS just fine). We mark
      # the step as continue-on-error so a known-noisy success isn't
      # treated as a job failure, and the regen step below runs
      # regardless via `if: always()`. The regen script is idempotent
      # and only lists release directories whose files are actually
      # present on disk — so a real upload failure produces an
      # internally-consistent manifest that omits the bad release.
      - name: Upload binaries to VPS
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          command_timeout: 15m
          source: "dist/*"
          target: "/var/www/humanity/releases/${{ github.ref_name }}/"
          strip_components: 1

      - name: Regenerate manifest + latest symlink
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          script: /usr/local/bin/regen-releases-manifest

  # Bundle data files alongside the binary + generate per-file manifest
  bundle-data:
    name: Bundle data files
    needs: build
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create data archive
        run: |
          tar czf HumanityOS-data-${{ github.ref_name }}.tar.gz \
            --exclude="data/audio/sfx/*" \
            --exclude="data/audio/music/*" \
            --exclude="data/audio/ambient/*" \
            data/ \
            assets/icons/ \
            assets/shaders/

      - name: Generate per-file data manifest
        run: node scripts/gen-data-manifest.js ${{ github.ref_name }}
        # Writes data-manifest-${tag}.json in repo root.

      - name: Upload data bundle + manifest to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HumanityOS-data-${{ github.ref_name }}.tar.gz
            data-manifest-${{ github.ref_name }}.json

      # Upload as workflow artifact so mirror-to-vps can scp these to the
      # sovereignty mirror alongside the platform binaries (one batched upload,
      # one manifest regen).
      - name: Upload data artifact for VPS mirror
        uses: actions/upload-artifact@v4
        with:
          name: humanity-data
          path: |
            HumanityOS-data-${{ github.ref_name }}.tar.gz
            data-manifest-${{ github.ref_name }}.json

  # Notify chat
  notify:
    name: Notify chat
    needs: build
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Post build result to #announcements
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            SECRET=$(grep '^API_SECRET' /opt/Humanity/.env | cut -d= -f2- | tr -d '\r')
            TAG="${{ github.ref_name }}"
            RUN_URL="https://github.com/Shaostoul/Humanity/actions/runs/${{ github.run_id }}"
            MSG="🚀 **Native Desktop $TAG built** — Windows · Linux · macOS binaries ready. [Release](<https://github.com/Shaostoul/Humanity/releases/tag/$TAG>)"
            curl -s -X POST "http://localhost:3210/api/send" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${SECRET}" \
              -d "{\"channel\":\"announcements\",\"content\":\"$MSG\",\"from_name\":\"Deploy Bot\"}" || true
