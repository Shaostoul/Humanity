name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Gate: Windows builds first. If this fails, nothing else runs. ──────────
  build-windows:
    name: Build (windows-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Bundle web assets for local-first desktop
        run: node scripts/bundle-web.js

      - name: Build Tauri app (Windows)
        working-directory: app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: humanity-windows-x64
          path: app/target/x86_64-pc-windows-msvc/release/bundle/**/*

      - name: Publish Windows to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: false
          files: |
            app/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            app/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe.sig
            app/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
            app/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi.sig

  # ── Other platforms only run if Windows gate passed ─────────────────────────
  build-others:
    name: Build (${{ matrix.label }})
    needs: build-windows
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Bundle web assets for local-first desktop
        run: node scripts/bundle-web.js

      - name: Build Tauri app
        working-directory: app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: humanity-${{ matrix.label }}
          path: app/target/${{ matrix.target }}/release/bundle/**/*

      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: false
          files: |
            app/target/${{ matrix.target }}/release/bundle/**/*.dmg
            app/target/${{ matrix.target }}/release/bundle/**/*.tar.gz
            app/target/${{ matrix.target }}/release/bundle/**/*.tar.gz.sig
            app/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            app/target/${{ matrix.target }}/release/bundle/**/*.AppImage.sig
            app/target/${{ matrix.target }}/release/bundle/**/*.deb

  # ── Generate latest.json for auto-updater ───────────────────────────────────
  publish-update:
    needs: [build-windows, build-others]
    # Run as long as Windows succeeded — other platforms failing is non-blocking
    if: always() && needs.build-windows.result == 'success' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES="Release ${GITHUB_REF_NAME}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          LINUX_SIG=$(find artifacts -name "*.AppImage.sig" -type f -exec cat {} \; 2>/dev/null | head -1)
          LINUX_URL="https://github.com/Shaostoul/Humanity/releases/download/${GITHUB_REF_NAME}/$(find artifacts -name "*.AppImage" -not -name "*.sig" -type f -printf '%f\n' 2>/dev/null | head -1)"

          WIN_NSIS_SIG=$(find artifacts -name "*-setup.exe.sig" -type f -exec cat {} \; 2>/dev/null | head -1)
          WIN_NSIS_URL="https://github.com/Shaostoul/Humanity/releases/download/${GITHUB_REF_NAME}/$(find artifacts -name "*-setup.exe" -not -name "*.sig" -type f -printf '%f\n' 2>/dev/null | head -1)"

          WIN_MSI_SIG=$(find artifacts -name "*.msi.sig" -type f -exec cat {} \; 2>/dev/null | head -1)
          WIN_MSI_URL="https://github.com/Shaostoul/Humanity/releases/download/${GITHUB_REF_NAME}/$(find artifacts -name "*.msi" -not -name "*.sig" -type f -printf '%f\n' 2>/dev/null | head -1)"

          MACOS_ARM_SIG=$(find artifacts/humanity-macos-arm64 -name "*.tar.gz.sig" -type f -exec cat {} \; 2>/dev/null | head -1)
          MACOS_ARM_URL="https://github.com/Shaostoul/Humanity/releases/download/${GITHUB_REF_NAME}/$(find artifacts/humanity-macos-arm64 -name "*.tar.gz" -not -name "*.sig" -type f -printf '%f\n' 2>/dev/null | head -1)"

          MACOS_X64_SIG=$(find artifacts/humanity-macos-x64 -name "*.tar.gz.sig" -type f -exec cat {} \; 2>/dev/null | head -1)
          MACOS_X64_URL="https://github.com/Shaostoul/Humanity/releases/download/${GITHUB_REF_NAME}/$(find artifacts/humanity-macos-x64 -name "*.tar.gz" -not -name "*.sig" -type f -printf '%f\n' 2>/dev/null | head -1)"

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "${NOTES}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "linux-x86_64": { "signature": "${LINUX_SIG}", "url": "${LINUX_URL}" },
              "windows-x86_64": { "signature": "${WIN_NSIS_SIG:-${WIN_MSI_SIG}}", "url": "${WIN_NSIS_URL:-${WIN_MSI_URL}}" },
              "darwin-aarch64": { "signature": "${MACOS_ARM_SIG}", "url": "${MACOS_ARM_URL}" },
              "darwin-x86_64": { "signature": "${MACOS_X64_SIG}", "url": "${MACOS_X64_URL}" }
            }
          }
          EOF
          cat latest.json

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json

  # ── Notify #announcements regardless of outcome ──────────────────────────────
  notify:
    name: Notify chat
    needs: [build-windows, build-others]
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Post build result to #announcements
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            SECRET=$(grep '^API_SECRET' /opt/Humanity/.env | cut -d= -f2- | tr -d '\r')
            WIN="${{ needs.build-windows.result }}"
            OTHERS="${{ needs.build-others.result }}"
            TAG="${{ github.ref_name }}"
            RUN_URL="https://github.com/Shaostoul/Humanity/actions/runs/${{ github.run_id }}"

            if [ "$WIN" = "success" ] && [ "$OTHERS" = "success" ]; then
              MSG="✅ **Desktop $TAG built** — Windows · Linux · macOS ready. [Release](<https://github.com/Shaostoul/Humanity/releases/tag/$TAG>)"
            elif [ "$WIN" = "success" ] && [ "$OTHERS" != "success" ]; then
              MSG="⚠️ **Desktop $TAG** — Windows ✅ built, other platforms failed. [Details](<$RUN_URL>)"
            else
              MSG="❌ **Desktop $TAG build failed** — Windows gate failed, no binaries produced. [Details](<$RUN_URL>)"
            fi

            curl -s -X POST "http://localhost:3210/api/send" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${SECRET}" \
              -d "{\"channel\":\"announcements\",\"content\":\"$MSG\",\"from_name\":\"Deploy Bot\"}" || true
