name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
            artifact_name: HumanityOS.exe
            asset_name: HumanityOS-windows-x64.exe
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            artifact_name: HumanityOS
            asset_name: HumanityOS-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            artifact_name: HumanityOS
            asset_name: HumanityOS-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
            artifact_name: HumanityOS
            asset_name: HumanityOS-macos-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build native engine (release)
        run: cargo build --release --target ${{ matrix.target }} --features native

      - name: Bundle binary with data
        shell: bash
        run: |
          mkdir -p dist/HumanityOS
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/HumanityOS/${{ matrix.asset_name }}
          # Copy game data and assets
          cp -r data/ dist/HumanityOS/data/
          cp -r assets/icons/ dist/HumanityOS/assets/icons/
          cp -r assets/shaders/ dist/HumanityOS/assets/shaders/
          # Remove large audio placeholders if they exist
          rm -rf dist/HumanityOS/data/audio/sfx/* dist/HumanityOS/data/audio/music/* dist/HumanityOS/data/audio/ambient/* 2>/dev/null || true
          # Create zip
          cd dist && tar czf HumanityOS-${{ matrix.label }}.tar.gz HumanityOS/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: humanity-${{ matrix.label }}
          path: dist/HumanityOS-${{ matrix.label }}.tar.gz

      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: false
          files: dist/HumanityOS-${{ matrix.label }}.tar.gz

  # Bundle data files alongside the binary
  bundle-data:
    name: Bundle data files
    needs: build
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create data archive
        run: |
          tar czf HumanityOS-data-${{ github.ref_name }}.tar.gz \
            --exclude="data/audio/sfx/*" \
            --exclude="data/audio/music/*" \
            --exclude="data/audio/ambient/*" \
            data/ \
            assets/icons/ \
            assets/shaders/

      - name: Upload data bundle to release
        uses: softprops/action-gh-release@v2
        with:
          files: HumanityOS-data-${{ github.ref_name }}.tar.gz

  # Notify chat
  notify:
    name: Notify chat
    needs: build
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Post build result to #announcements
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            SECRET=$(grep '^API_SECRET' /opt/Humanity/.env | cut -d= -f2- | tr -d '\r')
            TAG="${{ github.ref_name }}"
            RUN_URL="https://github.com/Shaostoul/Humanity/actions/runs/${{ github.run_id }}"
            MSG="🚀 **Native Desktop $TAG built** — Windows · Linux · macOS binaries ready. [Release](<https://github.com/Shaostoul/Humanity/releases/tag/$TAG>)"
            curl -s -X POST "http://localhost:3210/api/send" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${SECRET}" \
              -d "{\"channel\":\"announcements\",\"content\":\"$MSG\",\"from_name\":\"Deploy Bot\"}" || true
