name: Verify

# Fast correctness gate on every push + PR. This is the BACKSTOP that the Windows-only,
# opt-in `just verify` can never be: it runs on a CLEAN ubuntu checkout, so the lints the
# dev host can only run via the standalone-rustc dance (the Windows LNK1318 PDB limit)
# become an unconditional gate, and the relay-feature build -- the one CI deploys with --
# is checked at PR/push time instead of only discovered red in the post-merge deploy log.
#
# Two documented incident classes this closes:
#   1. An ungated native module kept "Deploy to VPS" RED for 25 releases (v0.381->v0.414)
#      because nothing checked the relay build before merge. `cargo check --features relay`
#      below makes that impossible to miss.
#   2. Untracked source files (.rs/.ron/.csv) that compile locally but fail a fresh
#      checkout. This job IS the fresh checkout -- a committed `mod x;` that references an
#      un-added x.rs simply fails to compile here. Do NOT add working-tree caching that
#      would defeat this; only the Cargo build cache is restored (Swatinem/rust-cache).
#
# Scope note: the NATIVE build + lib tests are NOT run here. `cargo check --features
# native` pulls alsa-sys/wayland/xkbcommon, whose build scripts need system C dev libs
# (libasound2-dev, ...) that a bare runner lacks, and the lib tests additionally need to
# LINK those. Both already run on the dev host (`just verify` / `just check`). CI's
# unique value is the link-free gates below: the relay build (the deploy feature set),
# the std-only lints, and doc-links -- exactly the classes the Windows host gates only
# via opt-in dances. Adding native coverage here would mean apt-installing the C libs;
# deferred to keep this robust.
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: check + lints
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Relay build (the feature set the VPS deploys with -- the #1 gate)
        run: cargo check --features relay --no-default-features

      - name: GUI + engine lints (all five, standalone -- no native link)
        run: |
          export CARGO_MANIFEST_DIR="$(pwd)"
          for t in emdash_lint theme_token_lint theme_editor_coverage icon_glyph_lint engine_wiring_lint; do
            echo ">> lint: $t"
            rustc --test --edition 2021 -A warnings "tests/$t.rs" -o "/tmp/$t.test" && "/tmp/$t.test"
          done

      - name: Doc links (must stay 0 broken)
        run: node scripts/check-doc-links.js

      - name: BIP39 wordlists in sync (web == native, canonical + round-trip)
        run: node scripts/check-bip39-wordlists.js
