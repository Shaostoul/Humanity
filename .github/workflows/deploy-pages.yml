name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Simple mirror: copy entire docs/ tree into _includes/canon/docs/
      # Jekyll wrapper pages use {% include canon/docs/FILENAME.md %}
      # Accord pages use {% include canon/accord/FILENAME.md %}
      - name: Mirror docs into website/_includes/canon
        shell: bash
        run: |
          set -euo pipefail
          rm -rf docs/website/_includes/canon
          mkdir -p docs/website/_includes/canon/docs
          mkdir -p docs/website/_includes/canon/accord
          mkdir -p docs/website/_includes/canon/reference

          # Mirror entire docs/ tree (except website/) into canon/docs/
          rsync -a docs/ --exclude=website/ docs/website/_includes/canon/docs/

          # Accord gets its own top-level canon path (wrapper pages use canon/accord/)
          rsync -a docs/accord/ docs/website/_includes/canon/accord/

          # Reference gets its own path too
          for f in CONTRIBUTING.md README.md; do
            [ -f "$f" ] && cp "$f" docs/website/_includes/canon/reference/
          done

      - name: Verify canon mirror
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/website/_includes/canon/accord/humanity_accord.md
          test -f docs/website/_includes/canon/docs/00-START-HERE.md
          test -f docs/website/_includes/canon/docs/design/architecture.md
          test -f docs/website/_includes/canon/reference/README.md

      - name: Build with Jekyll (Pages)
        uses: actions/jekyll-build-pages@v1
        with:
          source: docs/website
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
