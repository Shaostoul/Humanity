name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Mirror canonical docs into website/_includes/canon (generated build material)
      - name: Mirror canonical docs into website/_includes/canon
        shell: bash
        run: |
          set -euo pipefail
          rm -rf docs/website/_includes/canon
          mkdir -p docs/website/_includes/canon
          rsync -a --delete docs/accord/ docs/website/_includes/canon/accord/
          rsync -a --delete docs/ --exclude=website/ --exclude=accord/ docs/website/_includes/canon/docs/
          # Symlink docs as design for backward-compat with existing wrapper pages
          ln -s docs docs/website/_includes/canon/design
          # Copy select root .md files as reference docs
          mkdir -p docs/website/_includes/canon/reference
          for f in SECURITY_AUDIT.md CONTRIBUTING.md README.md; do
            [ -f "$f" ] && cp "$f" docs/website/_includes/canon/reference/
          done

      # Hard fail early if the expected include targets are missing.
      - name: Verify canon mirror
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/website/_includes/canon/accord/humanity_accord.md
          test -f docs/website/_includes/canon/docs/core/architecture.md
          test -f docs/website/_includes/canon/docs/00-START-HERE.md
          test -f docs/website/_includes/canon/reference/README.md


      # Debug dump: if the build fails, you can see what Jekyll actually had.
      - name: Dump website tree (debug)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== docs/website/_layouts ==="
          ls -la docs/website/_layouts || true
          echo "=== docs/website root ==="
          ls -la docs/website
          echo "=== docs/website/_includes/canon ==="
          find docs/website/_includes/canon -maxdepth 3 -type f -print


      # Official GitHub Pages Jekyll build action
      - name: Build with Jekyll (Pages)
        uses: actions/jekyll-build-pages@v1
        with:
          source: docs/website
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
