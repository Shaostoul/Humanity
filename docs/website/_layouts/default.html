<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    // Apply saved theme before paint to prevent flash
    (function() {
      var saved = localStorage.getItem('hos_theme');
      if (saved) document.documentElement.dataset.theme = saved;
    })();
  </script>
</head>
<body>

  <!-- Fixed top nav -->
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-brand">H</a>
      <div class="nav-tabs">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' or page.url == '/index.html' %}class="active"{% endif %}>Home</a>
        <a href="{{ '/accord' | relative_url }}" {% if page.url contains '/accord' %}class="active"{% endif %}>Accord</a>
        <a href="{{ '/design' | relative_url }}" {% if page.url contains '/design' %}class="active"{% endif %}>Design</a>
        <a href="{{ '/docs' | relative_url }}" {% if page.url contains '/docs' %}class="active"{% endif %}>Docs</a>
        <a href="{{ '/knowledge' | relative_url }}" {% if page.url contains '/knowledge' %}class="active"{% endif %}>Knowledge</a>
        <a href="{{ '/status' | relative_url }}" {% if page.url contains '/status' %}class="active"{% endif %}>Status</a>
        <a href="{{ '/get-involved' | relative_url }}" {% if page.url contains '/get-involved' %}class="active"{% endif %}>Get Involved</a>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
        <span class="theme-icon"></span>
      </button>
      <button class="hamburger" onclick="document.querySelector('.mobile-menu').classList.toggle('open')" aria-label="Menu">&#9776;</button>
    </div>
  </nav>

  <!-- Mobile dropdown menu -->
  <div class="mobile-menu">
    <a href="{{ '/' | relative_url }}" {% if page.url == '/' or page.url == '/index.html' %}class="active"{% endif %}>Home</a>
    <a href="{{ '/accord' | relative_url }}" {% if page.url contains '/accord' %}class="active"{% endif %}>Accord</a>
    <a href="{{ '/design' | relative_url }}" {% if page.url contains '/design' %}class="active"{% endif %}>Design</a>
    <a href="{{ '/docs' | relative_url }}" {% if page.url contains '/docs' %}class="active"{% endif %}>Docs</a>
    <a href="{{ '/knowledge' | relative_url }}" {% if page.url contains '/knowledge' %}class="active"{% endif %}>Knowledge</a>
    <a href="{{ '/status' | relative_url }}" {% if page.url contains '/status' %}class="active"{% endif %}>Status</a>
    <a href="{{ '/get-involved' | relative_url }}" {% if page.url contains '/get-involved' %}class="active"{% endif %}>Get Involved</a>
  </div>

  <!-- RGB line under nav -->
  <div class="rgb-line"></div>

  <!-- Main content -->
  <main class="site-content">
    {{ content }}
  </main>

  <!-- Fixed footer -->
  <footer class="site-footer">
    <span>HumanityOS &mdash; Public domain &middot; CC0 1.0</span>
    <a href="https://github.com/Shaostoul/Humanity" target="_blank" rel="noopener">
      <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
  </footer>

  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var current = html.dataset.theme;
      html.dataset.theme = current === 'light' ? '' : 'light';
      localStorage.setItem('hos_theme', html.dataset.theme);
      updateThemeIcon();
    }
    function updateThemeIcon() {
      var isLight = document.documentElement.dataset.theme === 'light';
      document.querySelector('.theme-icon').textContent = isLight ? '\u2600\uFE0F' : '\uD83C\uDF19';
    }
    updateThemeIcon();
  </script>

</body>
</html>
