# Chat subdomain — redirect to main domain
# Keep /ws and /api for backwards compat (existing bot scripts, etc.)
server {
    server_name chat.united-humanity.us;
    client_max_body_size 6m;

    location /ws {
        proxy_pass http://127.0.0.1:3210;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3210;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 301 https://united-humanity.us/chat;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/chat.united-humanity.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.united-humanity.us/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Main domain
server {
    server_name united-humanity.us www.united-humanity.us;

    root /var/www/humanity;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Cache-Control "no-cache, must-revalidate" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://cdn.jsdelivr.net https://*.arweave.net https://nftstorage.link https://*.ipfs.nftstorage.link; connect-src 'self' https://united-humanity.us wss://united-humanity.us wss://chat.united-humanity.us https://cdn.jsdelivr.net https://api.mainnet-beta.solana.com https://api.devnet.solana.com https://api.testnet.solana.com https://api.coingecko.com https://quote-api.jup.ag https://api.github.com https://blockchain.info; font-src 'self';" always;

    # Chat
    location = /chat {
        alias /var/www/humanity/chat/index.html;
        default_type text/html;
        # nginx drops ALL inherited add_header directives in any location that
        # declares its own, so the server-level security headers must be
        # re-listed here or this page ships with none (audit 2026-06-12 found
        # /chat lacked X-Frame-Options -> clickjackable).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://cdn.jsdelivr.net https://*.arweave.net https://nftstorage.link https://*.ipfs.nftstorage.link; connect-src 'self' https://united-humanity.us wss://united-humanity.us wss://chat.united-humanity.us https://cdn.jsdelivr.net https://api.mainnet-beta.solana.com https://api.devnet.solana.com https://api.testnet.solana.com https://api.coingecko.com https://quote-api.jup.ag https://api.github.com https://blockchain.info; font-src 'self';" always;
        add_header Cache-Control "no-store" always;
    }

    # WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:3210;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health check (external uptime monitoring) -> relay.
    # Added v0.285.x: the relay serves /health (liveness) but nginx
    # previously had no route for it, so the public URL fell through to
    # static-file serving and 404'd. Off-site monitoring needs this.
    location = /health {
        proxy_pass http://127.0.0.1:3210;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate-limited read API
    location ~ ^/api/(messages|peers|stats|reactions|pins)$ {
        limit_req zone=api_read_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:3210;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:3210;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Upload — stricter rate limit
    location /api/upload {
        limit_req zone=upload_limit burst=2 nodelay;
        client_max_body_size 6m;
        proxy_pass http://127.0.0.1:3210;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads served by relay
    # Self-hosted release-binary mirror (Step 3 of distribution-sovereignty plan).
    location /releases/ {
        alias /var/www/humanity/releases/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header X-Content-Type-Options nosniff;
        add_header Cache-Control "public, max-age=3600";
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3210;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Current 12 pages ──
    location = /dashboard  { try_files /dashboard.html =404; }
    location = /profile    { try_files /profile.html =404; }
    location = /home       { try_files /home.html =404; }
    location = /inventory  { try_files /inventory.html =404; }
    location = /tasks      { try_files /tasks.html =404; }
    location = /calendar   { try_files /calendar.html =404; }
    location = /notes      { try_files /notes.html =404; }
    location = /maps       { try_files /maps.html =404; }
    location = /market     { try_files /market.html =404; }
    location = /web        { try_files /web.html =404; }
    location = /settings   { try_files /settings.html =404; }
    location = /ops        { try_files /ops.html =404; }
    location = /dev        { try_files /dev.html =404; }
    location = /roadmap    { try_files /roadmap.html =404; }
    location = /download   { try_files /download.html =404; }
    location = /wallet     { try_files /wallet.html =404; }
    location = /donate     { try_files /donate.html =404; }
    location = /data       { try_files /data.html =404; }

    # ── Merged page redirects ──
    location = /skills     { return 301 /profile; }
    location = /equipment  { return 301 /inventory; }
    location = /quests     { return 301 /tasks; }
    location = /logbook    { return 301 /notes; }
    location = /vault      { return 301 /settings; }
    location = /knowledge  { return 301 /settings; }
    location = /systems    { return 301 /home; }
    location = /learn      { return 301 /web; }
    location = /streams    { return 301 /chat; }
    location = /studio     { return 301 /chat; }

    # ── Legacy redirects ──
    location = /board      { return 301 /home; }
    location = /map        { return 301 /maps; }
    location = /browse     { return 301 /web; }
    location = /info       { return 301 /settings; }
    location = /debug      { return 301 /ops; }
    location = /reality    { return 301 /profile; }
    location = /fantasy    { return 301 /profile; }
    location = /source     { return 301 /inventory; }

    # Landing page
    location = / {
        try_files /index.html =404;
        # Re-list the security headers: this location's own add_header (below)
        # would otherwise drop every inherited one, shipping the entry page
        # (first contact for new users) with NO CSP/HSTS/nosniff/frame headers
        # (audit 2026-06-12, confirmed live).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://cdn.jsdelivr.net https://*.arweave.net https://nftstorage.link https://*.ipfs.nftstorage.link; connect-src 'self' https://united-humanity.us wss://united-humanity.us wss://chat.united-humanity.us https://cdn.jsdelivr.net https://api.mainnet-beta.solana.com https://api.devnet.solana.com https://api.testnet.solana.com https://api.coingecko.com https://quote-api.jup.ag https://api.github.com https://blockchain.info; font-src 'self';" always;
        add_header Cache-Control "no-store" always;
    }

    # Static files
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/chat.united-humanity.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.united-humanity.us/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP → HTTPS redirects
server {
    listen 80;
    server_name chat.united-humanity.us;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name united-humanity.us www.united-humanity.us;
    return 301 https://$host$request_uri;
}
