<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streams — HumanityOS</title>
  <style>:root {
  --bg:#0d0d0d; --bg-card:#131313; --bg-panel:#141414; --bg-input:#1a1a1a;
  --border:#222; --text:#e0e0e0; --text-muted:#888; --accent:#22aa66;
  --success:#4a8; --error:#e55; --warning:#eb4;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }
#page-app { flex: 1; overflow-y: auto; }
.btn { padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; border: none; font-family: inherit; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { filter: brightness(1.15); }
.btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
.btn-secondary:hover { border-color: var(--accent); color: var(--text); }
.btn-danger { background: rgba(220,50,50,0.15); border: 1px solid rgba(220,50,50,0.4); color: #e55; }
.btn-danger:hover { background: rgba(220,50,50,0.25); }
.btn-live { background: rgba(220,50,50,0.9); color: #fff; border: none; }
.btn-live:hover { background: #e00; }
@keyframes live-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(220,50,50,0.4)} 50%{box-shadow:0 0 0 8px rgba(220,50,50,0)} }
.panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; margin-bottom: 0.8rem; }
.panel-title { font-weight: 700; font-size: 0.92rem; color: var(--accent); margin-bottom: 0.7rem; display: flex; align-items: center; gap: 0.4rem; cursor: pointer; user-select: none; }
.collapsible-body.collapsed { display: none; }

.streams-page { padding: 1rem; display: flex; flex-direction: column; gap: 1rem; max-width: 1600px; margin: 0 auto; }
.streams-toolbar { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
.search-bar { flex: 1; min-width: 150px; max-width: 300px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text); padding: 0.35rem 0.7rem; border-radius: 6px; font-size: 0.82rem; }
.search-bar:focus { outline: none; border-color: var(--accent); }
.live-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.8rem; }
.stream-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
.stream-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.stream-card .thumb { position: relative; width: 100%; aspect-ratio: 16/9; background: #0a0a0a; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
.stream-card .thumb .live-dot { position: absolute; top: 0.4rem; left: 0.4rem; background: #e00; color: #fff; font-size: 0.65rem; font-weight: 700; padding: 1px 6px; border-radius: 3px; }
.stream-card .thumb .viewer-count { position: absolute; top: 0.4rem; right: 0.4rem; background: rgba(0,0,0,0.7); color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; }
.stream-card .info { padding: 0.5rem 0.7rem; }
.stream-card .info .s-title { font-size: 0.82rem; font-weight: 600; margin-bottom: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stream-card .info .s-meta { font-size: 0.72rem; color: var(--text-muted); }
.multi-grid { display: grid; gap: 0.5rem; }
.multi-grid.g1 { grid-template-columns: 1fr; }
.multi-grid.g2 { grid-template-columns: 1fr 1fr; }
.multi-grid.g3 { grid-template-columns: 1fr 1fr; }
.multi-grid.g4 { grid-template-columns: 1fr 1fr; }
.stream-viewer { position: relative; background: #000; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.stream-viewer-aspect { aspect-ratio: 16/9; }
.stream-viewer video { width: 100%; height: 100%; object-fit: contain; }
.stream-viewer-header { position: absolute; top: 0; left: 0; right: 0; padding: 0.3rem 0.6rem; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; }
.stream-viewer-close { margin-left: auto; background: rgba(220,50,50,0.7); border: none; color: #fff; width: 22px; height: 22px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
.streams-layout { display: grid; grid-template-columns: 1fr 320px; gap: 1rem; }
@media (max-width: 900px) { .streams-layout { grid-template-columns: 1fr; } }
.chat-box { display: flex; flex-direction: column; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.chat-box-header { padding: 0.5rem 0.8rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 0.85rem; }
.chat-box-messages { overflow-y: auto; padding: 0.5rem; font-size: 0.8rem; max-height: 380px; min-height: 160px; }
.chat-box-messages .msg { padding: 0.1rem 0; }
.chat-box-messages .msg .author { color: var(--accent); font-weight: 600; }
.chat-box-input { display: flex; gap: 0.3rem; padding: 0.4rem 0.5rem; border-top: 1px solid var(--border); }
.chat-box-input input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.3rem 0.5rem; border-radius: 5px; font-size: 0.8rem; }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); grid-column: 1/-1; }
.empty-state .icon { font-size: 3rem; margin-bottom: 0.5rem; opacity: 0.3; }
</style>
</head>
<body>
<script src="/shared/shell.js" data-active="streams"></script>
<div id="page-app">
<div class="streams-page">
  <div class="streams-toolbar">
    <h1 style="font-size:1.1rem;font-weight:700;color:var(--accent);">&#128250; Streams</h1>
    <input class="search-bar" type="text" id="stream-search" placeholder="Search streams..." oninput="filterStreams(this.value)">
    <div style="flex:1;"></div>
    <button class="btn btn-secondary" style="font-size:0.8rem;" onclick="refreshStreams()">&#128260; Refresh</button>
    <a href="/studio" class="btn btn-primary" style="font-size:0.8rem;text-decoration:none;">&#127897;&#65039; Go to Studio</a>
  </div>

  <!-- Active multi-stream viewer -->
  <div id="active-viewers-section" style="display:none;">
    <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:0.5rem;">
      <span style="font-size:0.85rem;font-weight:600;color:var(--accent);">Watching</span>
      <span id="watching-count" style="font-size:0.75rem;color:var(--text-muted);"></span>
      <div style="flex:1;"></div>
      <button class="btn btn-secondary" style="font-size:0.75rem;padding:0.25rem 0.6rem;" onclick="closeAllStreams()">&#10005; Close All</button>
      <button class="btn btn-secondary" style="font-size:0.75rem;padding:0.25rem 0.5rem;" onclick="setLayout(1)" title="1 stream">&#9632;</button>
      <button class="btn btn-secondary" style="font-size:0.75rem;padding:0.25rem 0.5rem;" onclick="setLayout(2)" title="2 streams">&#8864;</button>
      <button class="btn btn-secondary" style="font-size:0.75rem;padding:0.25rem 0.5rem;" onclick="setLayout(4)" title="4 streams">&#8862;</button>
    </div>
    <div class="streams-layout">
      <div id="multi-stream-grid" class="multi-grid g1"></div>
      <div>
        <div class="chat-box" style="height:100%;max-height:500px;">
          <div class="chat-box-header">&#128172; <span style="color:var(--accent);">#stream</span>
            <span style="font-size:0.7rem;color:var(--text-muted);margin-left:auto;">visible without a stream open</span>
          </div>
          <div class="chat-box-messages" id="stream-channel-messages"></div>
          <div class="chat-box-input">
            <input type="text" id="stream-channel-input" placeholder="Chat in #stream..." onkeydown="if(event.key==='Enter')sendStreamChat('stream-channel-input')">
            <button class="btn btn-primary" onclick="sendStreamChat('stream-channel-input')" style="padding:0.3rem 0.6rem;">&#10148;</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Live now grid -->
  <div>
    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.6rem;">
      <span style="font-size:0.85rem;font-weight:600;">&#128308; Live Now</span>
      <span id="live-count" style="font-size:0.75rem;color:var(--text-muted);background:var(--bg-card);padding:1px 7px;border-radius:10px;border:1px solid var(--border);"></span>
    </div>
    <div class="live-grid" id="live-streams-grid">
      <div class="empty-state">
        <div class="icon">&#128225;</div>
        <p>No one is live right now.<br>Be the first &#8212; <a href="/studio" style="color:var(--accent);">start your stream</a>.</p>
      </div>
    </div>
  </div>

  <!-- #stream chat — always visible -->
  <div id="always-stream-chat">
    <div style="font-size:0.85rem;font-weight:600;margin-bottom:0.5rem;">&#128172; #stream Chat <span style="font-size:0.72rem;color:var(--text-muted);font-weight:400;">&#8212; no stream required to participate</span></div>
    <div class="chat-box">
      <div class="chat-box-messages" id="stream-chat-feed"></div>
      <div class="chat-box-input">
        <input type="text" id="stream-chat-input-bottom" placeholder="Chat in #stream..." onkeydown="if(event.key==='Enter')sendStreamChat('stream-chat-input-bottom')">
        <button class="btn btn-primary" onclick="sendStreamChat('stream-chat-input-bottom')" style="padding:0.3rem 0.6rem;">&#10148;</button>
      </div>
    </div>
  </div>
</div>
</div>
<script>

let hubWs = null, hubWsTimer = null;
let allStreams = [], openStreams = [], streamChatHistory = [];
let myHubKey = '', myHubName = 'Viewer';

function hubConnect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  hubWs = new WebSocket(proto + '//' + location.hostname + (location.port ? ':'+location.port : '') + '/ws');
  hubWs.onopen = function() {
    clearTimeout(hubWsTimer);
    const stored = localStorage.getItem('humanity_identity');
    if (stored) { try { const id = JSON.parse(stored); myHubKey = id.publicKeyHex||''; myHubName = id.name||'Viewer'; hubWs.send(JSON.stringify({type:'Hello',public_key:myHubKey})); } catch(e){} }
    hubWs.send(JSON.stringify({type:'chat',from:myHubKey,from_name:myHubName,content:'/history stream',timestamp:Date.now(),channel:'stream'}));
    requestStreamList();
  };
  hubWs.onclose = function() { hubWsTimer = setTimeout(hubConnect, 4000); };
  hubWs.onerror = function() { hubWs.close(); };
  hubWs.onmessage = function(ev) { try { handleHubMsg(JSON.parse(ev.data)); } catch(e){} };
}

function requestStreamList() {
  if (hubWs && hubWs.readyState === 1) hubWs.send(JSON.stringify({type:'stream_list_request'}));
}

function handleHubMsg(msg) {
  if (msg.type === 'stream_list' || msg.type === 'live_list') { allStreams = msg.streams || msg.peers || []; renderLiveGrid(); }
  if (msg.type === 'chat' && msg.channel === 'stream') addStreamChatMsg(msg.from_name||'anon', msg.content||'');
  if (msg.type === 'history') (msg.messages||[]).forEach(m => { if (m.channel==='stream') addStreamChatMsg(m.from_name||'anon', m.content||''); });
}

function addStreamChatMsg(author, text) {
  streamChatHistory.push({author,text}); if(streamChatHistory.length>300) streamChatHistory.shift(); renderStreamChat();
}
function renderStreamChat() {
  ['stream-channel-messages','stream-chat-feed'].forEach(id => {
    const el = document.getElementById(id); if (!el) return;
    el.innerHTML = streamChatHistory.slice(-100).map(m => '<div class="msg"><span class="author">'+esc(m.author)+':</span> '+esc(m.text)+'</div>').join('');
    el.scrollTop = el.scrollHeight;
  });
}
function sendStreamChat(inputId) {
  const inp = document.getElementById(inputId); if (!inp) return;
  const text = inp.value.trim(); if (!text) return; inp.value = '';
  if (hubWs && hubWs.readyState === 1) hubWs.send(JSON.stringify({type:'chat',from:myHubKey,from_name:myHubName,content:text,timestamp:Date.now(),channel:'stream'}));
  addStreamChatMsg(myHubName||'me', text);
}

function renderLiveGrid(filter) {
  const grid = document.getElementById('live-streams-grid'); if (!grid) return;
  const countEl = document.getElementById('live-count');
  let streams = allStreams;
  if (filter) streams = streams.filter(s => (s.title||s.display_name||'').toLowerCase().includes(filter.toLowerCase()));
  if (countEl) countEl.textContent = streams.length + ' live';
  if (!streams.length) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">&#128225;</div><p>No one is live right now.<br>Be the first &#8212; <a href="/studio" style="color:var(--accent);">start your stream</a>.</p></div>';
    return;
  }
  grid.innerHTML = streams.map(s => {
    const k = esc(s.key||''), name = esc(s.display_name||s.name||'?'), title = esc(s.title||'Untitled'), viewers = s.viewer_count||0;
    return '<div class="stream-card" onclick="openStream(''+k+'',''+name+'',''+title+'')">' +
      '<div class="thumb"><span>&#127916;</span><span class="live-dot">LIVE</span><span class="viewer-count">&#128065; '+viewers+'</span></div>' +
      '<div class="info"><div class="s-title">'+title+'</div><div class="s-meta">'+name+'</div></div></div>';
  }).join('');
}
function filterStreams(q) { renderLiveGrid(q); }
function refreshStreams() { requestStreamList(); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function openStream(key, name, title) {
  if (openStreams.find(s=>s.key===key)) return;
  if (openStreams.length >= 4) { alert('Max 4 streams at once'); return; }
  openStreams.push({key,name,title,pc:null});
  renderMultiGrid(); updateWatchingCount();
  document.getElementById('active-viewers-section').style.display = '';
  document.getElementById('always-stream-chat').style.display = 'none';
  if (hubWs && hubWs.readyState===1) hubWs.send(JSON.stringify({type:'stream_offer',to:key,data:{type:'request'},from:myHubKey}));
}
function closeStream(key) {
  openStreams = openStreams.filter(s=>s.key!==key); renderMultiGrid(); updateWatchingCount();
  if (!openStreams.length) { document.getElementById('active-viewers-section').style.display='none'; document.getElementById('always-stream-chat').style.display=''; }
}
function closeAllStreams() { openStreams=[]; renderMultiGrid(); document.getElementById('active-viewers-section').style.display='none'; document.getElementById('always-stream-chat').style.display=''; }
function setLayout(n) { const g=document.getElementById('multi-stream-grid'); if(g) g.className='multi-grid g'+Math.min(n,openStreams.length||1); }
function updateWatchingCount() { const el=document.getElementById('watching-count'); if(el) el.textContent=openStreams.length+' stream'+(openStreams.length!==1?'s':''); }
function renderMultiGrid() {
  const grid = document.getElementById('multi-stream-grid'); if (!grid) return;
  const n = openStreams.length;
  grid.className = 'multi-grid g'+(n<=1?'1':n<=2?'2':n<=3?'3':'4');
  grid.innerHTML = openStreams.map(s =>
    '<div class="stream-viewer"><div class="stream-viewer-aspect"><video id="sv-'+esc(s.key)+'" autoplay playsinline style="width:100%;height:100%;object-fit:contain;background:#000;"></video></div>' +
    '<div class="stream-viewer-header"><span style="color:#e00;font-size:0.65rem;font-weight:700;">LIVE</span>' +
    '<span style="font-size:0.75rem;">'+esc(s.name)+'</span>' +
    '<span style="font-size:0.72rem;color:var(--text-muted);">'+esc(s.title)+'</span>' +
    '<button class="stream-viewer-close" onclick="closeStream(''+esc(s.key)+'')">&#10005;</button></div></div>'
  ).join('');
}

document.addEventListener('DOMContentLoaded', function() {
  hubConnect();
  setInterval(requestStreamList, 30000);
});

</script>
</body>
</html>
