<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home, HumanityOS</title>
  <meta name="description" content="The ideal closed-loop homestead: every loop, every component, honestly sized for one person. The outline is also the game's requirements list for Home.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/shared/theme.css">
  <style>
    /* WEB MIRRORS NATIVE (operator, 2026-07-05): this page renders the SAME
       data/home_outline.json the native Home page's "ideal closed loop" panel
       renders (src/gui/pages/homes.rs). One data file, two faithful surfaces.
       The old localStorage room-decorator that used to live here diverged from
       the native homestead system and was replaced by this outline (v0.700). */
    body { min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 0 24px 80px; }

    .hero { text-align: center; padding: 40px 0 8px; }
    .hero h1 { font-size: clamp(1.6rem, 3.5vw, 2.4rem); font-weight: 800; margin-bottom: 6px; }
    .hero h1 em { font-style: normal; color: var(--accent); }
    .hero .subtitle { color: var(--text-muted); font-size: 0.95rem; max-width: 640px; margin: 0 auto 10px; }
    .hero .intro { color: var(--text-secondary, var(--text)); font-size: 0.88rem; max-width: 720px; margin: 0 auto 24px; line-height: 1.7; }

    .loop-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 14px; overflow: hidden;
    }
    /* All info immediately exposed, no expand/collapse (operator 2026-07-05:
       "I'd rather have all the info immediately exposed"). */
    .loop-head {
      display: flex; align-items: center; gap: 10px; padding: 14px 18px;
    }
    .loop-name { font-weight: 700; font-size: 1rem; }
    .loop-mark { font-size: 0.72rem; font-weight: 700; padding: 2px 10px; border-radius: var(--radius-lg); }
    .loop-mark.closes { background: rgba(42,102,68,0.2); color: var(--success, #2a6); }
    .loop-mark.open { background: rgba(255,136,17,0.15); color: var(--accent); }
    .loop-parts { margin-left: auto; font-size: 0.75rem; color: var(--text-muted); }
    .loop-body { display: block; padding: 0 18px 16px; border-top: 1px solid var(--border); }
    .loop-demand { font-size: 0.82rem; color: var(--text); margin: 12px 0 6px; }
    .loop-demand b { color: var(--accent); font-weight: 600; }
    .loop-note { font-size: 0.82rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 12px; }

    .req { display: flex; gap: 10px; padding: 7px 0; border-top: 1px dashed var(--border); font-size: 0.82rem; }
    .req .qty { flex-shrink: 0; min-width: 130px; font-weight: 600; }
    .req .why { color: var(--text-muted); line-height: 1.55; }
    .req .gid { display: block; font-size: 0.68rem; color: var(--text-muted); opacity: 0.7; font-family: monospace; }
    .tier-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin: 14px 0 2px; }
    .tier-label.baseline { color: var(--text); }
    .tier-label.luxury { color: #48f; }
    .notgame { display: inline-block; font-size: 0.66rem; font-weight: 700; padding: 1px 8px; border-radius: var(--radius-lg); background: rgba(255,136,17,0.15); color: var(--accent); margin-left: 6px; }

    .panel {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px; margin: 22px 0;
    }
    .panel.traded { border-color: rgba(255,136,17,0.45); }
    .panel h3 { font-size: 0.95rem; margin-bottom: 8px; }
    .panel.traded h3 { color: var(--accent); }
    .panel p, .panel li { font-size: 0.82rem; color: var(--text-muted); line-height: 1.7; }
    .panel ul { padding-left: 1.3rem; }
    .footer-note { text-align: center; font-size: 0.82rem; color: var(--text-muted); font-style: italic; max-width: 680px; margin: 28px auto 0; line-height: 1.7; }
    .load-err { text-align: center; color: var(--text-muted); padding: 40px 0; }
  </style>
</head>
<body>
<script src="/shared/events.js?v=1"></script>
<script src="/shared/shell.js" data-active="home"></script>
<script src="/shared/defaults.js"></script>
<script src="/shared/settings.js"></script>
<script src="/shared/eli5.js"></script>

<div class="container">
  <div class="hero">
    <h1 id="o-title">The ideal <em>closed-loop</em> homestead</h1>
    <p class="subtitle" id="o-subtitle"></p>
    <p class="intro" id="o-intro"></p>
  </div>
  <div id="o-loops"><p class="load-err">Loading the outline...</p></div>
  <div class="panel traded" id="o-cannot" style="display:none">
    <h3>What one home cannot close</h3>
    <p id="o-cannot-note"></p>
  </div>
  <div class="panel" id="o-next" style="display:none">
    <h3>What the game still needs for Home</h3>
    <ul id="o-next-list"></ul>
  </div>
  <p class="footer-note" id="o-footer"></p>
</div>

<script>
(async function () {
  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  let o;
  try {
    const res = await fetch('/data/home_outline.json');
    if (!res.ok) throw new Error(res.status);
    o = await res.json();
  } catch (e) {
    document.getElementById('o-loops').innerHTML =
      '<p class="load-err">Could not load the outline data (' + esc(e.message) + '). It ships with the app and site as data/home_outline.json.</p>';
    return;
  }
  if (o.title) document.getElementById('o-title').textContent = o.title;
  document.getElementById('o-subtitle').textContent = o.subtitle || '';
  document.getElementById('o-intro').textContent = o.intro || '';

  const wrap = document.getElementById('o-loops');
  wrap.innerHTML = (o.loops || []).map(function (l, i) {
    // Two tiers per loop (operator 2026-07-05): bare minimum first, then the
    // life-of-luxury additions. Empty game_id renders the honest
    // "not in game yet" chip, so the luxury tier doubles as the game-gap list.
    function reqRow(r) {
      return '<div class="req">' +
        '<span class="qty">' + esc(r.qty) + ' ' + esc(r.item) +
          (r.game_id
            ? '<span class="gid">' + esc(r.game_id) + '</span>'
            : '<span class="notgame">not in game yet</span>') +
        '</span>' +
        '<span class="why">' + esc(r.why) + '</span>' +
      '</div>';
    }
    const all = l.requirements || [];
    const base = all.filter(r => !r.tier || r.tier === 'baseline');
    const lux = all.filter(r => r.tier === 'luxury');
    let reqs = '';
    if (base.length) reqs += '<div class="tier-label baseline">Bare minimum</div>' + base.map(reqRow).join('');
    if (lux.length) reqs += '<div class="tier-label luxury">Life of luxury</div>' + lux.map(reqRow).join('');
    return '<div class="loop-card" id="loop-' + esc(l.id) + '">' +
      '<div class="loop-head">' +
        '<span class="loop-name">' + esc(l.name) + '</span>' +
        '<span class="loop-mark ' + (l.closes ? 'closes' : 'open') + '">' + (l.closes ? 'closes' : 'open') + '</span>' +
        '<span class="loop-parts">' + (l.requirements || []).length + ' parts</span>' +
      '</div>' +
      '<div class="loop-body">' +
        '<p class="loop-demand"><b>Demand:</b> ' + esc(l.demand) + '</p>' +
        '<p class="loop-note">' + esc(l.closure_note) + '</p>' +
        reqs +
      '</div>' +
    '</div>';
  }).join('');

  if (o.cannot_close && o.cannot_close.note) {
    document.getElementById('o-cannot-note').textContent = o.cannot_close.note;
    document.getElementById('o-cannot').style.display = '';
  }
  if (Array.isArray(o.in_game_next) && o.in_game_next.length) {
    document.getElementById('o-next-list').innerHTML =
      o.in_game_next.map(s => '<li>' + esc(s) + '</li>').join('');
    document.getElementById('o-next').style.display = '';
  }
  document.getElementById('o-footer').textContent = o.footer || '';
})();
</script>
</body>
</html>
