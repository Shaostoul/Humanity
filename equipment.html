<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipment — HumanityOS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #equip-app {
      display: flex;
      flex: 1;
      height: calc(100vh - 42px);
      overflow: hidden;
    }

    /* ── Sidebar: categories ── */
    #equip-sidebar {
      width: 200px;
      min-width: 170px;
      background: #111;
      border-right: 1px solid #222;
      overflow-y: auto;
      padding: 0.5rem 0.4rem;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .equip-group-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.5rem 0.5rem 0.3rem;
      margin-top: 0.4rem;
    }
    .equip-cat {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.6rem;
      cursor: pointer;
      border-radius: 6px;
      font-size: 0.86rem;
      color: #aaa;
      transition: background 0.1s, color 0.1s;
      border: 1px solid transparent;
      margin-bottom: 0.1rem;
    }
    .equip-cat:hover { background: #1a1a1a; color: #eee; }
    .equip-cat.active { background: #141414; color: #fff; border-color: #2a6; }
    .equip-cat .eq-count {
      margin-left: auto;
      font-size: 0.7rem;
      background: #1e1e1e;
      color: #666;
      padding: 1px 5px;
      border-radius: 8px;
    }

    /* ── Main content ── */
    #equip-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #equip-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid #1a1a1a;
      background: #0f0f0f;
      flex-shrink: 0;
    }
    #equip-header h1 { font-size: 1rem; font-weight: 700; color: #fff; flex: 1; }
    #equip-search {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 0.28rem 0.65rem;
      font-size: 0.84rem;
      width: 170px;
      outline: none;
    }
    #equip-search:focus { border-color: #2a6; }
    #add-equip-btn {
      background: #1a4a2a;
      border: 1px solid #2a6;
      color: #4d9;
      padding: 0.28rem 0.7rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.84rem;
      font-weight: 600;
      transition: background 0.12s;
    }
    #add-equip-btn:hover { background: #1f5a32; }

    #equip-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
    }

    /* Loadout grid (for worn/equipped) */
    .loadout-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.6rem;
    }
    .loadout-slot {
      background: #131313;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 0.7rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      min-height: 90px;
      cursor: pointer;
      transition: border-color 0.12s;
      position: relative;
    }
    .loadout-slot:hover { border-color: #333; }
    .loadout-slot .slot-icon { font-size: 1.6rem; }
    .loadout-slot .slot-label {
      font-size: 0.7rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .loadout-slot .slot-item {
      font-size: 0.8rem;
      color: #ddd;
      font-weight: 600;
      text-align: center;
    }
    .loadout-slot.empty { border-style: dashed; }
    .loadout-slot.empty .slot-item { color: #444; font-weight: 400; font-style: italic; }

    /* List view (for tools, vehicles) */
    .equip-item-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .equip-item {
      background: #131313;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 0.65rem 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }
    .equip-item:hover { border-color: #333; background: #161616; }
    .equip-item .item-icon { font-size: 1.3rem; width: 28px; text-align: center; flex-shrink: 0; }
    .equip-item .item-body { flex: 1; min-width: 0; }
    .equip-item .item-name { font-size: 0.88rem; font-weight: 600; color: #eee; }
    .equip-item .item-sub  { font-size: 0.76rem; color: #666; margin-top: 2px; }
    .equip-item .item-cond {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .cond-excellent { color: #4d9; background: rgba(68,204,136,0.1); border: 1px solid rgba(68,204,136,0.25); }
    .cond-good      { color: #4cf; background: rgba(68,204,255,0.1); border: 1px solid rgba(68,204,255,0.25); }
    .cond-fair      { color: #fa4; background: rgba(255,170,68,0.1); border: 1px solid rgba(255,170,68,0.25); }
    .cond-poor      { color: #f64; background: rgba(255,102,68,0.1); border: 1px solid rgba(255,102,68,0.25); }
    .item-delete {
      background: none; border: none; color: #333; cursor: pointer;
      font-size: 0.85rem; padding: 0.1rem; border-radius: 3px;
      transition: color 0.12s;
    }
    .item-delete:hover { color: #e44; }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 3rem; gap: 0.75rem;
      color: #444; text-align: center;
    }
    .empty-state .ei { font-size: 2.5rem; }

    /* Section header */
    .list-section-header {
      font-size: 0.72rem;
      font-weight: 700;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.5rem 0 0.35rem;
      margin-bottom: 0.25rem;
    }

    /* ── Modal ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.72); z-index: 8000;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #141414; border: 1px solid #2a2a2a;
      border-radius: 12px; padding: 1.4rem;
      width: min(440px, 95vw); display: flex; flex-direction: column; gap: 0.85rem;
    }
    .modal h2 { font-size: 1.05rem; color: #fff; }
    .modal label { font-size: 0.79rem; color: #888; display: block; margin-bottom: 0.2rem; }
    .modal input, .modal select, .modal textarea {
      width: 100%; background: #1a1a1a; border: 1px solid #333;
      border-radius: 6px; color: #ddd; padding: 0.4rem 0.65rem;
      font-size: 0.86rem; font-family: inherit; outline: none;
    }
    .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: #2a6; }
    .modal textarea { resize: vertical; min-height: 60px; }
    .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; padding-top: 0.25rem; }
    .btn-cancel { background: transparent; border: 1px solid #333; color: #888; padding: 0.38rem 0.9rem; border-radius: 6px; cursor: pointer; font-size: 0.86rem; }
    .btn-save   { background: #1a4a2a; border: 1px solid #2a6; color: #4d9; padding: 0.38rem 1.1rem; border-radius: 6px; cursor: pointer; font-size: 0.86rem; font-weight: 600; }
    .btn-cancel:hover { border-color: #555; color: #ccc; }
    .btn-save:hover   { background: #1f5a32; }
  </style>
</head>
<body>
<script src="/shared/shell.js" data-active="equipment"></script>
<div id="equip-app">

  <!-- Sidebar -->
  <nav id="equip-sidebar">
    <div class="equip-group-label">Worn / Active</div>
    <div class="equip-cat active" data-cat="loadout" onclick="setCategory('loadout')">🧍 Loadout <span class="eq-count" id="cnt-loadout">0</span></div>

    <div class="equip-group-label">Carried</div>
    <div class="equip-cat" data-cat="edc"     onclick="setCategory('edc')">🎒 EDC / Daily <span class="eq-count" id="cnt-edc">0</span></div>
    <div class="equip-cat" data-cat="tools"   onclick="setCategory('tools')">🔧 Tools <span class="eq-count" id="cnt-tools">0</span></div>
    <div class="equip-cat" data-cat="tech"    onclick="setCategory('tech')">💻 Tech / Devices <span class="eq-count" id="cnt-tech">0</span></div>

    <div class="equip-group-label">Workshop</div>
    <div class="equip-cat" data-cat="power"   onclick="setCategory('power')">⚡ Power Tools <span class="eq-count" id="cnt-power">0</span></div>
    <div class="equip-cat" data-cat="hand"    onclick="setCategory('hand')">🪛 Hand Tools <span class="eq-count" id="cnt-hand">0</span></div>
    <div class="equip-cat" data-cat="safety"  onclick="setCategory('safety')">🦺 Safety Gear <span class="eq-count" id="cnt-safety">0</span></div>

    <div class="equip-group-label">Vehicles</div>
    <div class="equip-cat" data-cat="vehicles" onclick="setCategory('vehicles')">🚗 Vehicles <span class="eq-count" id="cnt-vehicles">0</span></div>
  </nav>

  <!-- Main panel -->
  <div id="equip-main">
    <div id="equip-header">
      <h1 id="equip-heading">Loadout</h1>
      <input id="equip-search" type="text" placeholder="Search equipment…" oninput="renderList()">
      <button id="add-equip-btn" onclick="openModal()">+ Add Item</button>
    </div>
    <div id="equip-list"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="equip-modal">
  <div class="modal">
    <h2 id="modal-title">Add Equipment</h2>
    <div>
      <label>Name *</label>
      <input id="eq-name" type="text" placeholder="Item name">
    </div>
    <div class="modal-row">
      <div>
        <label>Category</label>
        <select id="eq-cat">
          <option value="loadout">Loadout</option>
          <option value="edc">EDC / Daily</option>
          <option value="tools">Tools</option>
          <option value="tech">Tech / Devices</option>
          <option value="power">Power Tools</option>
          <option value="hand">Hand Tools</option>
          <option value="safety">Safety Gear</option>
          <option value="vehicles">Vehicles</option>
        </select>
      </div>
      <div>
        <label>Condition</label>
        <select id="eq-cond">
          <option value="excellent">Excellent</option>
          <option value="good" selected>Good</option>
          <option value="fair">Fair</option>
          <option value="poor">Poor / Needs Repair</option>
        </select>
      </div>
    </div>
    <div class="modal-row">
      <div>
        <label>Icon / Emoji</label>
        <input id="eq-icon" type="text" placeholder="e.g. 🔧" maxlength="4">
      </div>
      <div>
        <label>Slot (for Loadout)</label>
        <select id="eq-slot">
          <option value="">— none —</option>
          <option value="head">Head</option>
          <option value="neck">Neck</option>
          <option value="chest">Chest</option>
          <option value="back">Back</option>
          <option value="hands">Hands</option>
          <option value="waist">Waist</option>
          <option value="legs">Legs</option>
          <option value="feet">Feet</option>
          <option value="ring-l">Ring (L)</option>
          <option value="ring-r">Ring (R)</option>
          <option value="main-hand">Main Hand</option>
          <option value="off-hand">Off Hand</option>
        </select>
      </div>
    </div>
    <div>
      <label>Notes</label>
      <textarea id="eq-notes" placeholder="Brand, model, serial, purchase info…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'hos_equipment_v1';
let items = [];
let activeCat = 'loadout';
let editingId = null;

const LOADOUT_SLOTS = [
  {id:'head',     icon:'🪖', label:'Head'},
  {id:'neck',     icon:'📿', label:'Neck'},
  {id:'chest',    icon:'👕', label:'Chest'},
  {id:'back',     icon:'🎒', label:'Back'},
  {id:'hands',    icon:'🧤', label:'Hands'},
  {id:'waist',    icon:'🔗', label:'Waist'},
  {id:'legs',     icon:'👖', label:'Legs'},
  {id:'feet',     icon:'👟', label:'Feet'},
  {id:'ring-l',   icon:'💍', label:'Ring (L)'},
  {id:'ring-r',   icon:'💍', label:'Ring (R)'},
  {id:'main-hand',icon:'⚔️', label:'Main Hand'},
  {id:'off-hand', icon:'🛡️', label:'Off Hand'},
];

const CAT_LABELS = {
  loadout:'Loadout', edc:'EDC / Daily', tools:'Tools', tech:'Tech / Devices',
  power:'Power Tools', hand:'Hand Tools', safety:'Safety Gear', vehicles:'Vehicles'
};

function load() {
  try { items = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e) { items = []; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setCategory(cat) {
  activeCat = cat;
  document.querySelectorAll('.equip-cat').forEach(el => el.classList.toggle('active', el.dataset.cat === cat));
  document.getElementById('equip-heading').textContent = CAT_LABELS[cat] || cat;
  renderList();
}

function updateCounts() {
  const cats = Object.keys(CAT_LABELS);
  cats.forEach(c => {
    const el = document.getElementById('cnt-' + c);
    if (el) el.textContent = items.filter(i => i.cat === c).length;
  });
}

function renderList() {
  const search = (document.getElementById('equip-search').value || '').toLowerCase();
  const list = document.getElementById('equip-list');
  updateCounts();

  let visible = items.filter(i => i.cat === activeCat);
  if (search) visible = visible.filter(i =>
    (i.name||'').toLowerCase().includes(search) ||
    (i.notes||'').toLowerCase().includes(search)
  );

  if (activeCat === 'loadout') {
    // Show body-slot grid
    const slotMap = {};
    visible.forEach(i => { if (i.slot) slotMap[i.slot] = i; });
    list.innerHTML = '<div class="loadout-grid">' +
      LOADOUT_SLOTS.map(slot => {
        const item = slotMap[slot.id];
        return `<div class="loadout-slot${item ? '' : ' empty'}" onclick="${item ? `openModal('${item.id}')` : `openModalSlot('${slot.id}')`}">
          <div class="slot-icon">${item ? esc(item.icon || slot.icon) : slot.icon}</div>
          <div class="slot-label">${slot.label}</div>
          <div class="slot-item">${item ? esc(item.name) : 'Empty'}</div>
          ${item ? `<div class="item-cond cond-${item.cond}">${item.cond}</div>` : ''}
        </div>`;
      }).join('') +
    '</div>' +
    (visible.filter(i => !i.slot).length ? `
      <div class="list-section-header" style="margin-top:1rem;">Unslotted Items</div>
      <div class="equip-item-list">` + visible.filter(i=>!i.slot).map(i => renderItem(i)).join('') + '</div>' : '');
    return;
  }

  if (!visible.length) {
    list.innerHTML = `<div class="empty-state"><div class="ei">${getCatIcon(activeCat)}</div>
      <p>No ${CAT_LABELS[activeCat]} items yet.</p>
      <button class="btn-save" onclick="openModal()" style="margin-top:0.5rem;">+ Add First Item</button></div>`;
    return;
  }

  list.innerHTML = '<div class="equip-item-list">' + visible.map(i => renderItem(i)).join('') + '</div>';
}

function renderItem(i) {
  const condClass = 'cond-' + (i.cond || 'good');
  return `<div class="equip-item" onclick="openModal('${i.id}')">
    <div class="item-icon">${esc(i.icon || '📦')}</div>
    <div class="item-body">
      <div class="item-name">${esc(i.name)}</div>
      ${i.notes ? `<div class="item-sub">${esc(i.notes.slice(0,80))}</div>` : ''}
    </div>
    <span class="item-cond ${condClass}">${i.cond || 'good'}</span>
    <button class="item-delete" onclick="event.stopPropagation();deleteItem('${i.id}')" title="Remove">✕</button>
  </div>`;
}

function getCatIcon(cat) {
  return {loadout:'🧍',edc:'🎒',tools:'🔧',tech:'💻',power:'⚡',hand:'🪛',safety:'🦺',vehicles:'🚗'}[cat] || '📦';
}

function openModal(id) {
  editingId = id || null;
  const item = id ? items.find(x => x.id === id) : null;
  document.getElementById('modal-title').textContent = item ? 'Edit Item' : 'Add Equipment';
  document.getElementById('eq-name').value  = item ? item.name : '';
  document.getElementById('eq-cat').value   = item ? item.cat  : activeCat;
  document.getElementById('eq-cond').value  = item ? item.cond : 'good';
  document.getElementById('eq-icon').value  = item ? (item.icon || '') : '';
  document.getElementById('eq-slot').value  = item ? (item.slot || '') : '';
  document.getElementById('eq-notes').value = item ? (item.notes || '') : '';
  document.getElementById('equip-modal').classList.add('open');
  setTimeout(() => document.getElementById('eq-name').focus(), 50);
}

function openModalSlot(slotId) {
  openModal();
  document.getElementById('eq-slot').value = slotId;
  document.getElementById('eq-cat').value = 'loadout';
}

function closeModal() {
  document.getElementById('equip-modal').classList.remove('open');
  editingId = null;
}

function saveItem() {
  const name = document.getElementById('eq-name').value.trim();
  if (!name) { document.getElementById('eq-name').focus(); return; }
  if (editingId) {
    const i = items.find(x => x.id === editingId);
    if (i) {
      i.name = name;
      i.cat  = document.getElementById('eq-cat').value;
      i.cond = document.getElementById('eq-cond').value;
      i.icon = document.getElementById('eq-icon').value.trim();
      i.slot = document.getElementById('eq-slot').value || null;
      i.notes = document.getElementById('eq-notes').value.trim();
    }
  } else {
    items.push({
      id: uid(), name, icon: document.getElementById('eq-icon').value.trim(),
      cat:  document.getElementById('eq-cat').value,
      cond: document.getElementById('eq-cond').value,
      slot: document.getElementById('eq-slot').value || null,
      notes: document.getElementById('eq-notes').value.trim()
    });
  }
  save(); closeModal(); renderList();
}

function deleteItem(id) {
  items = items.filter(x => x.id !== id);
  save(); renderList();
}

document.getElementById('equip-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

load();
renderList();
</script>
</body>
</html>
